<div id="quote-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;padding:20px"><div style="background:#1e2236;border-radius:14px;padding:16px;max-width:500px;margin:auto"><div id="quote-preview"></div><button onclick="printQuote()">Imprimir</button><button onclick="shareQuote()">WhatsApp</button><button onclick="closeQuote()">Cerrar</button></div></div>

<script>
// ==================== ESTADO GLOBAL ====================
const LS='gpgt_v5';
let S={
  biz:{name:'Mi Negocio',sub:'',phone:'',addr:'',email:'',footer:'',emoji:'📦',logoData:''},
  products:[{id:1,name:'Thinner Laca',presentation:'Galón',unitLabel:'galón',unitSize:1,basePrice:52},{id:2,name:'Thinner Laca',presentation:'Tonel',unitLabel:'galón',unitSize:55,basePrice:52},{id:3,name:'Agua pura',presentation:'Litro',unitLabel:'litro',unitSize:1,basePrice:5}],
  nextPid:4,
  clients:[{id:1,name:'Juan García',phone:'5001-1234',address:'Zona 1'},{id:2,name:'María López',phone:'5002-5678',address:'Zona 10'}],
  nextCid:3,
  cp:{1:{_type:'custom',_listId:null,_visible:[1,2,3],1:52,2:52,3:5},2:{_type:'custom',_listId:null,_visible:[1,2,3],1:50,2:50,3:4.5}},
  priceLists:[],
  nextListId:1,
  clientFixedComments:{},
  orders:[],
  nextOid:1,
  lastBk:null,
  routes:[],
  nextRid:1,
  routePinned:[]
};
let ordItems=[{pid:'',qty:1,price:null}];
let ordComments=[''];
let editingOid=null;
function load(){
  try{
    let d=localStorage.getItem(LS);
    if(!d) d=localStorage.getItem('gpgt_v4');
    if(d){
      let p=JSON.parse(d);
      S={...S,...p};
      if(!S.priceLists) S.priceLists=[];
      if(!S.clientFixedComments) S.clientFixedComments={};
      if(!S.routes) S.routes=[];
      if(!S.routePinned) S.routePinned=[];
      if(S.cp){
        for(let cid in S.cp){
          let cp=S.cp[cid];
          if(cp&&typeof cp==='object'&&cp._type===undefined){
            cp._type='custom'; cp._listId=null;
            if(cp._visible===undefined) cp._visible=[];
          }
        }
      }
    }
  }catch(e){}
  if(!S.biz) S.biz={name:'Mi Negocio',sub:'',phone:'',addr:'',email:'',footer:'',emoji:'📦',logoData:''};
  if(!S.nextOid) S.nextOid=(S.orders?S.orders.length:0)+1;
  S.products.forEach(p=>{if(!p.unitLabel)p.unitLabel='unidad'; if(!p.unitSize)p.unitSize=1;});
}
function save(){ try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){} }
function Q(n){return 'Q'+Number(n||0).toLocaleString('es-GT',{minimumFractionDigits:2})}
function getEffectivePrice(cid,pid){
  let cp=S.cp[cid]||S.cp[String(cid)];
  if(!cp) return S.products.find(p=>p.id===pid)?.basePrice||0;
  if(cp._type==='list' && cp._listId){
    let list=S.priceLists.find(l=>l.id===cp._listId);
    if(list && list.prices[pid]!==undefined) return list.prices[pid];
    return S.products.find(p=>p.id===pid)?.basePrice||0;
  }
  if(cp[pid]!==undefined) return cp[pid];
  if(cp[String(pid)]!==undefined) return cp[String(pid)];
  return S.products.find(p=>p.id===pid)?.basePrice||0;
}
function lineTotal(cid,pid,qty,custom){
  let p=S.products.find(x=>x.id===Number(pid));
  if(!p) return 0;
  let price=(custom!=null)?custom:getEffectivePrice(cid,p.id);
  return price*(p.unitSize||1)*qty;
}
function orderTotal(items,cid){return items.reduce((s,it)=>s+lineTotal(cid,it.productId||it.pid,it.qty,it.customPrice),0);}
function toast(msg,col){let t=document.getElementById('toast');t.textContent=msg;t.style.background=col||'#10b981';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function goTab(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('#nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  let idx=['order','list','clients','products','pricelists','bizinfo','backup','routes'].indexOf(name);
  if(idx>=0) document.querySelectorAll('#nav button')[idx].classList.add('active');
  if(name==='order') renderOrderPage();
  if(name==='list') renderList();
  if(name==='clients') renderClients();
  if(name==='products') renderProducts();
  if(name==='pricelists') renderPriceLists();
  if(name==='bizinfo') loadBizForm();
  if(name==='backup') renderBackup();
  if(name==='routes') renderRoutes();
}
// ==================== IMPORTAR RESPALDO (CORREGIDO) ====================
function importBackup(event){
  let file=event.target.files[0];
  if(!file) return;
  let reader=new FileReader();
  reader.onload=function(ev){
    try{
      let imported=JSON.parse(ev.target.result);
      if(!imported.products || !imported.clients) throw new Error();
      if(confirm(`¿Restaurar respaldo?\n\n• ${imported.clients.length} clientes\n• ${imported.products.length} productos\n• ${imported.orders?.length||0} pedidos\n\nEsto reemplazará TODOS los datos actuales.`)){
        let nuevo={...S,...imported};
        if(!nuevo.priceLists) nuevo.priceLists=[];
        if(!nuevo.clientFixedComments) nuevo.clientFixedComments={};
        if(!nuevo.routes) nuevo.routes=[];
        if(!nuevo.routePinned) nuevo.routePinned=[];
        if(!nuevo.nextListId) nuevo.nextListId=1;
        if(!nuevo.nextRid) nuevo.nextRid=nuevo.routes.length?Math.max(...nuevo.routes.map(r=>r.id),0)+1:1;
        if(nuevo.cp){
          for(let cid in nuevo.cp){
            let cp=nuevo.cp[cid];
            if(cp && typeof cp==='object' && cp._type===undefined){
              cp._type='custom'; cp._listId=null;
              if(cp._visible===undefined) cp._visible=[];
            }
          }
        }
        S=nuevo;
        save();
        toast('✅ Datos restaurados. Recargando...','#10b981');
        setTimeout(()=>window.location.reload(),800);
      }
    }catch(e){alert('Archivo inválido');}
    event.target.value='';
  };
  reader.readAsText(file);
}
// ==================== FUNCIONES BÁSICAS ====================
function cancelEdit(){
  editingOid=null;
  ordItems=[{pid:'',qty:1,price:null}];
  ordComments=[''];
  document.getElementById('ord-cli').value='';
  document.getElementById('ord-cli-txt').value='';
  document.getElementById('ord-quote').value='';
  document.getElementById('ord-oc').value='';
  document.getElementById('ord-iva').checked=false;
  document.getElementById('ord-iva-inc').checked=false;
  refreshTotalWithIVA();
  document.getElementById('edit-banner').style.display='none';
  document.getElementById('btn-submit').textContent='Registrar';
  onCliChange();
  goTab('list');
}
function onCliChange(){
  let cid=Number(document.getElementById('ord-cli').value);
  if(!cid){document.getElementById('ord-body').style.display='none';document.getElementById('ord-ph').style.display='block';return;}
  document.getElementById('ord-body').style.display='block';document.getElementById('ord-ph').style.display='none';
  let fixed=S.clientFixedComments[cid]||[];
  if(fixed.length && editingOid===null){
    ordComments=[...fixed,''];
    renderCommentFields();
  }
  renderItems();
}
