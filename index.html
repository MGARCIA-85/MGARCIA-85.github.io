function BallIcon({ modalidad, size = 38 }) {
  if (modalidad === "Contrarreloj") {
    return <span style={{fontSize:size*0.85,lineHeight:1,flexShrink:0}}>⏱</span>;
  }
  const b = BALL_COLORS[modalidad]; if (!b) return null;
  const r = size / 2;
  const fs = size < 32 ? 9 : size < 44 ? 11 : 13;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{flexShrink:0}}>
      <circle cx={r} cy={r+1.5} r={r-1} fill="rgba(0,0,0,0.35)" />
      <circle cx={r} cy={r} r={r-1} fill={b.bg} />
      <ellipse cx={r*0.65} cy={r*0.52} rx={r*0.28} ry={r*0.18} fill="rgba(255,255,255,0.35)" />
      <circle cx={r} cy={r} r={r*0.38} fill="white" />
      <text x={r} y={r+fs*0.38} textAnchor="middle" fontSize={fs} fontWeight="bold" fill="#222" fontFamily="Arial,sans-serif">{b.num}</text>
    </svg>
  );
}

function CueBallSaque({ size }) {
  const r = size / 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={r} cy={r} r={r-0.5} fill="#f0ede0" />
      <circle cx={r*0.65} cy={r*0.78} r={r*0.13} fill="#bb1f00" />
      <circle cx={r*1.12} cy={r*0.62} r={r*0.11} fill="#bb1f00" />
      <circle cx={r*0.88} cy={r*1.15} r={r*0.12} fill="#bb1f00" />
    </svg>
  );
}

function createMatch(p1, p2, firstServe, carrera, modalidad, extraData={}) {
  return {
    id: uid(), p1Name: p1, p2Name: p2, firstServe,
    carrera, modalidad, games: [], currentServe: firstServe,
    wins: {p1:0, p2:0}, seriesFinished: false, seriesWinner: null,
    seriesHistory: [], seriesWins: {p1:0, p2:0}, ...extraData, seriesCount: 1,
    matchClosed: false, closedAt: null, createdAt: Date.now(),
  };
}

function formatDate(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const dias = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return dias[d.getDay()] + " " + d.getDate() + " " + meses[d.getMonth()] + " " + d.getHours().toString().padStart(2,"0") + ":" + d.getMinutes().toString().padStart(2,"0");
}

function Acceso({ ok }) {
  const [c, setC] = useState("");
  const [err, setErr] = useState(false);
  const [loading, setLoading] = useState(false);

  const go = async () => {
    if (!c.trim()) return;
    setLoading(true);
    try {
      const snap = await db.collection("config").doc("acceso").get();
      if (snap.exists && snap.data().codigo === c.trim()) {
        localStorage.setItem("bg","1"); ok();
      } else { setErr(true); setTimeout(()=>setErr(false),2000); }
    } catch(e) { setErr(true); setTimeout(()=>setErr(false),2000); }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 50% 35%,#0f2a5a,#081530)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{fontSize:11,color:"#c9a227",letterSpacing:4,textTransform:"uppercase"}}>Billares</div>
      <div style={{fontSize:34,fontWeight:900,color:"#fff",letterSpacing:2,lineHeight:1,marginBottom:6}}>García</div>
      <div style={{fontSize:10,color:"#2a4a8a",letterSpacing:2,marginBottom:36}}>Control de partidas</div>
      <div style={{width:"100%",maxWidth:300}}>
        <input type="password" value={c} onChange={e=>setC(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&!loading&&go()} placeholder="Código de acceso" autoFocus
          style={{width:"100%",padding:"13px 16px",borderRadius:12,background:err?"rgba(255,80,80,0.1)":"rgba(255,255,255,0.07)",border:err?"1px solid rgba(255,80,80,0.5)":"1px solid rgba(255,255,255,0.15)",color:"#fff",fontFamily:"inherit",fontSize:16,outline:"none",textAlign:"center",letterSpacing:4,boxSizing:"border-box"}}/>
        {err && <div style={{color:"#f87171",fontSize:12,textAlign:"center",marginTop:6}}>Código incorrecto</div>}
        <button onClick={go} disabled={loading}
          style={{marginTop:12,width:"100%",padding:"13px 0",borderRadius:12,background:"linear-gradient(135deg,#1e3a8a,#4ade80)",border:"none",color:"#fff",fontFamily:"inherit",fontSize:15,fontWeight:800,cursor:"pointer",opacity:loading?0.7:1}}>
          {loading?"Verificando...":"Entrar"}
        </button>
      </div>
    </div>
  );
}

                                    fontWeight:isW||isF?700:400,fontVariantNumeric:"tabular-nums",fontSize:12}}>
                                    {t!==undefined?fmtTime(t):"—"}{isW?" 🏆":""}{isF?" ⚠":""}
                                  </td>;
                                })}
                                <td style={{padding:"6px 6px",textAlign:"center",color:"#888",fontVariantNumeric:"tabular-nums",fontSize:11,borderLeft:"1px solid rgba(255,255,255,0.06)"}}>
                                  {serieAvg(pidx)!==null?fmtTime(serieAvg(pidx)):"—"}
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    );
                  })}
                </>);
              })()}
              <button onClick={()=>setShowHistoryP(false)} style={{width:"100%",marginTop:16,padding:"12px 0",borderRadius:12,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",color:"#bbb",fontFamily:"inherit",fontSize:14,fontWeight:600,cursor:"pointer"}}>Cerrar</button>
            </div>
          </div>
        );
      })()}
      </div>
    );
  }

  // ===== ESTADÍSTICAS =====
  if (screen === "stats") {
    const closed = matches.filter(m => m.matchClosed);
    const allMods = [...new Set(closed.map(m=>m.modalidad))].sort();
    const allPlayers = [...new Set(closed.flatMap(m=>m.modalidad==="Contrarreloj"?(m.crPlayers||[]):[m.p1Name,m.p2Name]).filter(Boolean))].sort();
    const plNames = playersList.map(p=>typeof p==="string"?p:p.name);

    // Toggle helpers
    const toggleMod = (m) => setSfModalidades(prev => prev.includes(m)?prev.filter(x=>x!==m):[...prev,m]);
    const toggleJug = (j) => setSfJugadores(prev => prev.includes(j)?prev.filter(x=>x!==j):[...prev,j]);

    // Filtrar partidas por período/fechas/modalidad/jugadores (duelos directos)
    const filtered = closed.filter(m => {
      // Modalidad
      if (sfModalidades.length>0 && !sfModalidades.includes(m.modalidad)) return false;
      // Período o rango
      const ts = m.closedAt||m.createdAt||0;
      const d = new Date(ts);
      if (sfPeriod === "Rango") {
        if (sfFechaDesde) {
          const [yy,mm,dd] = sfFechaDesde.split("-").map(Number);
          const fd = new Date(yy,mm-1,dd,0,0,0,0);
          if(d<fd) return false;
        }
        if (sfFechaHasta) {
          const [yy,mm,dd] = sfFechaHasta.split("-").map(Number);
          const fh = new Date(yy,mm-1,dd,23,59,59,999);
          if(d>fh) return false;
        }
      } else {
        const now2=Date.now();
        if (sfPeriod === "Hoy") {
          const hoy = new Date(); hoy.setHours(0,0,0,0);
          if (new Date(ts) < hoy) return false;
        } else if (sfPeriod === "Esta semana") {
          if (now2-ts > 604800000) return false;
        } else if (sfPeriod === "Este mes") {
          const now3 = new Date();
          const inicioMes = new Date(now3.getFullYear(), now3.getMonth(), 1, 0, 0, 0, 0);
          if (new Date(ts) < inicioMes) return false;
        }
      }
      // Duelos directos: si hay jugadores seleccionados, la partida debe incluir SOLO a esos jugadores
      if (sfJugadores.length > 0) {
        if (m.modalidad === "Contrarreloj") {
          const players = (m.crPlayers||[]).filter(p=>p?.trim());
          // Todos los jugadores de la partida deben estar en la selección
          const allInSelection = players.every(p => sfJugadores.includes(p));
          // Al menos uno de los seleccionados debe estar en la partida
          const anySelected = players.some(p => sfJugadores.includes(p));
          if (!allInSelection || !anySelected) return false;
        } else {
          // Partida normal: ambos jugadores deben estar en la selección
          const p1in = sfJugadores.includes(m.p1Name);
          const p2in = sfJugadores.includes(m.p2Name);
          if (!p1in || !p2in) return false;
        }
      }
      return true;
    });

    // Calcular stats por jugador
    const statsMap = {};
    const ensurePlayer = (name) => {
      if (!statsMap[name]) statsMap[name] = {
        name, partidas:0, partidasW:0, series:0, seriesW:0,
        juegos:0, juegosW:0, rachaMejor:0, rachaActual:0,
        goldenBreaks:0, mesas:0, breakRuns:0, remontadas:0, imparables:0, granDefensas:0, tresAlHilo:0, reyDelDia:0,
        crRondas:0, crRondasW:0, crTimes:[]
      };
    };

    filtered.forEach(m => {
      if (m.modalidad === "Contrarreloj") {
        const players = m.crPlayers||[];
        const order = m.crOrder||[];
        const serieWinsCR = m.crSerieWins||{};
        const roundWinsCR = m.crRoundWins||{};
        const accumTime = m.crAccumTime||{};
        const validRoundsCR = m.crValidRounds||{};
        const totalSeriesCR = m.crTotalSeries||1;
        const totalRoundsCR = m.crTotalRounds||1;
        // Ganador = más series; empate = mejor promedio
        const crStandings = [...order].sort((a,b)=>{
          const sw=(serieWinsCR[b]||0)-(serieWinsCR[a]||0); if(sw!==0) return sw;
          const aAvg=validRoundsCR[a]>0?(accumTime[a]||0)/validRoundsCR[a]:Infinity;
          const bAvg=validRoundsCR[b]>0?(accumTime[b]||0)/validRoundsCR[b]:Infinity;
          return aAvg-bAvg;
        });
        players.forEach((name,i) => {
          if (!name?.trim()) return;
          ensurePlayer(name);
          const s = statsMap[name];
          // CR no cuenta en partidas (👑), solo en series y juegos
          // Series = partidas CR ganadas (para columna 🏆)
          s.seriesW += (serieWinsCR[i]||0);
          s.series += totalSeriesCR;
          // JG = rondas ganadas en CR
          s.juegosW += (roundWinsCR[i]||0);
          // JG total = rondas realmente jugadas (no fijas)
          const totalRoundsPlayed = Object.values(roundWinsCR).reduce((a,b)=>a+b,0) || (totalSeriesCR * totalRoundsCR);
          s.juegos += totalRoundsPlayed;
          const vr = validRoundsCR[i];
          if (accumTime[i] && vr > 0) s.crTimes.push(accumTime[i]/vr);
        });
      } else {
        const history = m.seriesHistory||[];
        const sw1 = m.seriesWins?.p1||0;
        const sw2 = m.seriesWins?.p2||0;
        const pWinner = sw1>sw2?"p1":sw2>sw1?"p2":null;

        [m.p1Name, m.p2Name].forEach((name,pi) => {
          if (!name?.trim()) return;
          const key = pi===0?"p1":"p2";
          ensurePlayer(name);
          const s = statsMap[name];
          s.partidas++;
          if (pWinner===key) s.partidasW++;

          history.forEach(ser => {
            s.series++;
            const won = ser.winner===key;
            if (won) s.seriesW++;
            const serGames = ser.games||[];
            serGames.forEach(g => {
              s.juegos++;
              if (g.winner===key) s.juegosW++;
            });
            // Golden break: juegos donde este jugador tiene bola dorada
            serGames.filter(g=>g.winner===key && g.ballType==="gold").forEach(()=>s.goldenBreaks++);
            serGames.filter(g=>g.winner===key && g.ballType==="breakrun").forEach(()=>s.breakRuns++);
            serGames.filter(g=>g.winner===key && g.ballType==="grandefensa").forEach(()=>s.granDefensas=(s.granDefensas||0)+1);
            // Mesa limpia/barrida: juegos donde este jugador tiene diamante
            serGames.filter(g=>g.winner===key && g.ballType==="diamond").forEach(()=>s.mesas++);
            // Remontada: en algún momento de la serie el rival tuvo carrera-1 wins y el jugador tenía 0
            if (won && m.carrera>1) {
              const serGamesArr = ser.games||[];
              let myW=0, rivW=0;
              let huboRemontada=false;
              for (let gi=0; gi<serGamesArr.length; gi++) {
                const g = serGamesArr[gi];
                if (myW===0 && rivW>=(m.carrera-1)) { huboRemontada=true; break; }
                if (g.winner===key) myW++; else rivW++;
              }
              if (huboRemontada) s.remontadas=(s.remontadas||0)+1;
            }
            // Imparable: ganó la serie dejando al oponente en 0 juegos
            if (won) {
              const rivFinalWins = key==="p1"?(ser.p2wins||0):(ser.p1wins||0);
              if (rivFinalWins===0 && m.carrera>1) s.imparables=(s.imparables||0)+1;
            }
            // Racha
            if (won) { s.rachaActual++; if(s.rachaActual>s.rachaMejor) s.rachaMejor=s.rachaActual; }
            else s.rachaActual=0;
          });
          // 3 Series al hilo: 3 series consecutivas ganadas en la misma partida
          {
            let consecutivas = 0;
            let maxConsec = 0;
            (m.seriesHistory||[]).forEach(ser => {
              if (ser.winner===key) { consecutivas++; if(consecutivas>maxConsec) maxConsec=consecutivas; }
              else consecutivas=0;
            });
            if (maxConsec>=3) s.tresAlHilo=(s.tresAlHilo||0)+1;
          }
          (m.games||[]).forEach(g => {
            s.juegos++;
            if (g.winner===key) s.juegosW++;
          });
        });
      }
    });

    // Rey del día: ganó al menos 1 partida a cada jugador activo en un mismo día (historial completo)
    try {
      const activePlayers = playersList.filter(pl=>typeof pl==="object"&&pl.rankActivo!==false&&pl.rankActivo!==0).map(pl=>pl.name);
      if (activePlayers.length > 1) {
        const winsByDay = {};
        closed.forEach(m => {
          const sw1 = m.seriesWins?.p1||0;
          const sw2 = m.seriesWins?.p2||0;
          const winner = sw1>sw2?m.p1Name:sw2>sw1?m.p2Name:null;
          const loser = sw1>sw2?m.p2Name:sw2>sw1?m.p1Name:null;
          if (!winner||!loser) return;
          const day = new Date(m.createdAt||0).toDateString();
          if (!winsByDay[day]) winsByDay[day]={};
          if (!winsByDay[day][winner]) winsByDay[day][winner]=[];
          if (winsByDay[day][winner].indexOf(loser)===-1) winsByDay[day][winner].push(loser);
        });
        const reyCount = {};
        Object.values(winsByDay).forEach(byPlayer => {
          Object.keys(byPlayer).forEach(winner => {
            const beaten = byPlayer[winner];
            const needed = activePlayers.filter(p=>p!==winner);
            if (needed.length>0 && needed.every(p=>beaten.indexOf(p)!==-1)) {
              reyCount[winner] = (reyCount[winner]||0)+1;
            }
          });
        });
        Object.keys(reyCount).forEach(winner => {
          if (statsMap[winner]) statsMap[winner].reyDelDia = reyCount[winner];
        });
      }
    } catch(e) {}
    // Calcular insignias históricas (historial completo, sin filtro)
    const histIns = {};
    const ensureHist = (name) => { if(!histIns[name]) histIns[name]={br:0,ro:0,gb:0,rem:0,imp:0,gd:0,tal:0,rey:0}; };
    closed.forEach(m => {
      if (m.modalidad==="Contrarreloj") return;
      [["p1",m.p1Name],["p2",m.p2Name]].forEach(([key,name])=>{
        if(!name) return;
        ensureHist(name);
        const hist = m.seriesHistory||[];
        hist.forEach(ser => {
          const won = ser.winner===key;
          const serG = ser.games||[];
          serG.forEach(g => {
            if(g.winner===key){
              if(g.ballType==="breakrun") histIns[name].br++;
              if(g.ballType==="diamond") histIns[name].ro++;
              if(g.ballType==="gold") histIns[name].gb++;
              if(g.ballType==="grandefensa") histIns[name].gd++;
            }
          });
          if(won){
            const riv = key==="p1"?(ser.p2wins||0):(ser.p1wins||0);
            if(riv===0&&m.carrera>1) histIns[name].imp++;
            if(m.carrera>1){
              let my=0,rv=0,rem=false;
              for(let g of serG){if(my===0&&rv>=(m.carrera-1)){rem=true;break;}if(g.winner===key)my++;else rv++;}
              if(rem) histIns[name].rem++;
            }
          }
        });
        let consec=0,maxC=0;
        hist.forEach(ser=>{if(ser.winner===key){consec++;if(consec>maxC)maxC=consec;}else consec=0;});
        if(maxC>=3) histIns[name].tal++;
      });
    });
    // Rey del día en histIns
    try {
      const activePlayers = playersList.filter(pl=>typeof pl==="object"&&pl.rankActivo!==false&&pl.rankActivo!==0).map(pl=>pl.name);
      console.log('REY activePlayers:', activePlayers);
      if(activePlayers.length>1){
        const wbd={};
        closed.forEach(m=>{
          const sw1=m.seriesWins?.p1||0,sw2=m.seriesWins?.p2||0;
          const winner=sw1>sw2?m.p1Name:sw2>sw1?m.p2Name:null;
          const loser=sw1>sw2?m.p2Name:sw2>sw1?m.p1Name:null;
          if(!winner||!loser) return;
          const day=new Date(m.createdAt||0).toDateString();
          if(!wbd[day]) wbd[day]={};
          if(!wbd[day][winner]) wbd[day][winner]=[];
          if(wbd[day][winner].indexOf(loser)===-1) wbd[day][winner].push(loser);
        });
        Object.values(wbd).forEach(byP=>{
          Object.keys(byP).forEach(winner=>{
            const needed=activePlayers.filter(p=>p!==winner);
            if(needed.length>0&&needed.every(p=>byP[winner].indexOf(p)!==-1)){
              ensureHist(winner);
              histIns[winner].rey=(histIns[winner].rey||0)+1;
            }
          });
        });
      }
    } catch(e){}
    let rows = Object.values(statsMap);
    playersList.forEach(pl => {
      const pname = typeof pl==="string"?pl:pl.name;
      const isActive = typeof pl==="object"?pl.rankActivo!==false:false;
      if (isActive && !statsMap[pname]) rows.push({name:pname,partidas:0,partidasW:0,series:0,seriesW:0,juegos:0,juegosW:0,rachaMejor:0,rachaActual:0,goldenBreaks:0,mesas:0,breakRuns:0,remontadas:0,imparables:0,granDefensas:0,tresAlHilo:0,reyDelDia:0,crRondas:0,crRondasW:0,crTimes:[]});
    });
    // Filtrar jugadores inactivos
    const inactivos = new Set(playersList.filter(pl=>typeof pl==="object"&&(pl.rankActivo===false||pl.rankActivo===0)).map(pl=>pl.name));
    rows = rows.filter(r=>!inactivos.has(r.name));
    rows.sort((a,b)=>(b.partidasW-a.partidasW)||(b.seriesW-a.seriesW)||(b.juegosW-a.juegosW)||(b.crRondasW-a.crRondasW));

    const isCRonly = sfModalidades.length===1 && sfModalidades[0]==="Contrarreloj";
    const showCR = sfModalidades.includes("Contrarreloj") || sfModalidades.length===0;

    const chipS = (active) => ({
      padding:"5px 12px",borderRadius:20,fontFamily:"inherit",fontSize:11,fontWeight:600,cursor:"pointer",
      background:active?"linear-gradient(135deg,#1e3a8a,#4ade80)":"rgba(255,255,255,0.06)",
      border:active?"none":"1px solid rgba(255,255,255,0.11)",color:active?"#fff":"#999"
    });

    return (
      <div className="app-screen" style={{background:"radial-gradient(ellipse at 50% 35%,#0f2a5a 0%,#081530 55%,#05102a 100%)"}}>
        <div className="app-scroll"
          onTouchStart={e=>{ptrRef.current.startY=e.touches[0].clientY;ptrRef.current.active=false;}}
          onTouchMove={e=>{if(e.currentTarget.scrollTop===0&&e.touches[0].clientY-ptrRef.current.startY>70){ptrRef.current.active=true;setPtrActive(true);}else if(e.currentTarget.scrollTop>0){ptrRef.current.active=false;setPtrActive(false);}}}
          onTouchEnd={e=>{if(ptrRef.current.active){ptrRef.current.active=false;setPtrActive(false);window.location.reload();}else{setPtrActive(false);}}}
          style={{padding:"20px 14px"}}>
          <div className={"ptr-indicator"+(ptrActive?" ptr-visible":"")}>↓ Suelta para actualizar</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <div style={{fontSize:22,fontWeight:800,color:"#63b3ed"}}>📊 Estadísticas</div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={()=>setFiltrosOpen(o=>!o)} style={{background:filtrosOpen?"rgba(99,179,237,0.15)":"rgba(255,255,255,0.07)",border:"1px solid "+(filtrosOpen?"rgba(99,179,237,0.4)":"rgba(255,255,255,0.13)"),color:filtrosOpen?"#63b3ed":"#ccc",borderRadius:10,padding:"7px 13px",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>🔍 {filtrosOpen?"▲":"▼"}</button>
              <button onClick={()=>setScreenP("lobby")} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.13)",color:"#ccc",borderRadius:10,padding:"7px 13px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>← Volver</button>
            </div>
          </div>

          {/* Filtros */}
          {filtrosOpen && <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"12px",marginBottom:14}}>
            <>
            {/* Período */}
            <div style={{fontSize:10,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Período</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:sfPeriod==="Rango"?10:14}}>
              {["Hoy","Esta semana","Este mes","Todo","Rango"].map(p=>(
                <button key={p} onClick={()=>setSfPeriod(p)} style={chipS(sfPeriod===p)}>{p}</button>
              ))}
            </div>
            {sfPeriod==="Rango" && (()=>{
              const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
              const diasSem=["D","L","M","M","J","V","S"];
              const primerDia = new Date(calMes.y, calMes.m, 1).getDay();
              const diasEnMes = new Date(calMes.y, calMes.m+1, 0).getDate();
              const celdas = [];
              for(let i=0;i<primerDia;i++) celdas.push(null);
              for(let i=1;i<=diasEnMes;i++) celdas.push(i);
              const toISO = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              const fromISO = s => s ? new Date(s+'T00:00:00') : null;
              const desdeD = fromISO(sfFechaDesde);
              const hastaD = fromISO(sfFechaHasta);
              return <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <button onClick={()=>setCalMes(p=>{const d=new Date(p.y,p.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:"rgba(99,179,237,0.1)",border:"1px solid rgba(99,179,237,0.3)",color:"#63b3ed",borderRadius:8,padding:"4px 12px",cursor:"pointer",fontSize:16}}>‹</button>
                  <span style={{fontSize:13,fontWeight:700,color:"#63b3ed"}}>{meses[calMes.m]} {calMes.y}</span>
                  <button onClick={()=>setCalMes(p=>{const d=new Date(p.y,p.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};})} style={{background:"rgba(99,179,237,0.1)",border:"1px solid rgba(99,179,237,0.3)",color:"#63b3ed",borderRadius:8,padding:"4px 12px",cursor:"pointer",fontSize:16}}>›</button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
                  {diasSem.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:9,color:"#555",padding:"3px 0"}}>{d}</div>)}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
                  {celdas.map((d,i)=>{
                    if(!d) return <div key={i}/>;
                    const iso = toISO(calMes.y,calMes.m,d);
                    const isDesde = sfFechaDesde===iso;
                    const isHasta = sfFechaHasta===iso;
                    const inRange = desdeD&&hastaD&&new Date(iso+'T00:00:00')>desdeD&&new Date(iso+'T00:00:00')<hastaD;
                    return <div key={i} onClick={()=>{
                      if(calStep===0||(!sfFechaDesde)){setSfFechaDesde(iso);setSfFechaHasta('');setCalStep(1);}
                      else if(calStep===1){if(iso<sfFechaDesde){setSfFechaDesde(iso);setCalStep(1);}else{setSfFechaHasta(iso);setCalStep(0);}}
                    }} style={{textAlign:"center",fontSize:12,padding:"7px 2px",borderRadius:6,cursor:"pointer",
                      background:isDesde||isHasta?"#3b82f6":inRange?"rgba(59,130,246,0.2)":"transparent",
                      color:isDesde||isHasta?"#fff":inRange?"#93c5fd":"#ccc",
                      fontWeight:isDesde||isHasta?700:400}}>{d}</div>;
                  })}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:10,fontSize:11}}>
                  <span style={{color:"#888"}}>DESDE: <strong style={{color:"#63b3ed"}}>{sfFechaDesde||"--"}</strong></span>
                  <span style={{color:"#888"}}>HASTA: <strong style={{color:"#63b3ed"}}>{sfFechaHasta||"--"}</strong></span>
                </div>
                {(sfFechaDesde||sfFechaHasta)&&<button onClick={()=>{setSfFechaDesde('');setSfFechaHasta('');setCalStep(0);}} style={{marginTop:8,width:"100%",padding:"6px 0",borderRadius:8,background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",color:"#f87171",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>✕ Limpiar rango</button>}
                <div style={{fontSize:10,color:"#555",marginTop:6,textAlign:"center"}}>{calStep===1?"Ahora selecciona la fecha HASTA":"Toca una fecha para iniciar el rango"}</div>
              </div>;
            })()}

            {/* Modalidad (multi-select) */}
            <div style={{fontSize:10,color:"#555",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Modalidad <span style={{color:"#333",fontWeight:400}}>(toca para filtrar)</span></div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:14}}>
              {allMods.map(m=>(
                <button key={m} onClick={()=>toggleMod(m)} style={chipS(sfModalidades.includes(m))}>{m}</button>
              ))}
              {sfModalidades.length>0 && <button onClick={()=>setSfModalidades([])} style={{...chipS(false),color:"#f87171",borderColor:"rgba(248,113,113,0.3)"}}>✕ Limpiar</button>}

          </>)}

          <div style={{display:"flex",gap:12,marginTop:20}}>
            <button style={{flex:1,padding:"14px 0",borderRadius:10,background:"linear-gradient(135deg,#1e3a8a,#4ade80)",border:"none",color:"#fff",fontFamily:"inherit",fontSize:15,fontWeight:700,cursor:"pointer",opacity:ready?1:0.4}} onClick={startNewMatch} disabled={!ready}>Iniciar</button>
            <button style={{padding:"14px 16px",borderRadius:10,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.11)",color:"#aaa",fontFamily:"inherit",fontSize:14,cursor:"pointer"}} onClick={()=>{
              const pj = sessionStorage.getItem("pendingJornadaId");
              if(pj){setJornadaScreenP(pj);}else{setScreenP("lobby");}
            }}>Cancelar</button>
          </div>
        </div>
      </div>
    );
  }

  // ===== PARTIDA =====
  if (screen === "match") {
    if (!activeMatch) {
      if (!fbLoaded) return <div style={{minHeight:"100vh",background:"#081530",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:"#63b3ed",fontSize:14,fontFamily:"Georgia,serif",letterSpacing:1}}>Cargando...</div></div>;
      setScreenP("lobby"); return null;
    }
  } else if (!activeMatch) { return null; }
  const isReadOnly = activeMatch.matchClosed;
  const {p1Name, p2Name, currentServe, wins, carrera, modalidad, games, seriesFinished, seriesWinner, seriesWins, seriesCount, seriesHistory} = activeMatch;

  const CELL_W=44, CELL_H=130, NAM_W=290, HDR_H=18;
  const BORDER="2px solid rgba(255,255,255,0.22)";
  const BORDER_THIN="1px solid rgba(255,255,255,0.11)";
  const totalJuegos = carrera*2-1;
  const sw1 = seriesWins.p1+(seriesFinished&&seriesWinner==="p1"?1:0);
  const sw2 = seriesWins.p2+(seriesFinished&&seriesWinner==="p2"?1:0);

  const handleCellClick = (k, ji, ballType) => {
    const gameRecord = games[ji];
    const hasWon = gameRecord && gameRecord.winner === k;
    const isLastGame = ji === games.length-1;
    const isNext = !seriesFinished && ji === games.length;
    const bt = ballType || "normal";
    if (isNext) {
      const newWins = {...wins, [k]: wins[k]+1};
      const nextServe = currentServe==="p1"?"p2":"p1";
      const willFinish = newWins[k] >= carrera;
      updateMatch(activeId, m => ({...m, wins:newWins, games:[...m.games,{winner:k,serve:currentServe,ballType:bt,device:deviceName||undefined}], currentServe:nextServe, seriesFinished:willFinish, seriesWinner:willFinish?k:null}));
      // Marcar turno anotado si la partida pertenece a una jornada activa
      if (jornadaScreen && jornadaScreen!=="list") {
        saveJornadas(jornadas.map(j => j.id===jornadaScreen && j.turnStarted ? {...j, turnScored:true} : j));
        // Marcar en la partida que ya se anotó en este turno
        updateMatch(activeId, mm => ({...mm, jornadaTurnScored:true}));
      }
    } else if (hasWon && isLastGame) {
      updateMatch(activeId, m => {
        if (m.games.length===0) return m;
        const last = m.games[m.games.length-1];
        return {...m, games:m.games.slice(0,-1), wins:{...m.wins,[last.winner]:m.wins[last.winner]-1}, currentServe:last.serve, seriesFinished:false, seriesWinner:null, jornadaTurnScored:false};
      });
      // Resetear turnScored en jornada activa
      if (jornadaScreen && jornadaScreen!=="list") {
        saveJornadas(jornadas.map(j => j.id===jornadaScreen ? {...j, turnScored:false} : j));
      }
    }
    setBallMenu(null);
  };

  const handleCellLongPress = (k, ji) => {
    const isNext = !seriesFinished && ji === games.length;
    if (isNext && !isReadOnly) setBallMenu({k, ji});
  };

  return (
    <div className="app-screen" style={{background:"radial-gradient(ellipse at 50% 35%,#0f2a5a 0%,#081530 55%,#05102a 100%)"}}>

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 8px",borderBottom:"1px solid rgba(255,255,255,0.07)",background:"rgba(0,0,0,0.4)"}}>
        <button onClick={()=>setScreenP("lobby")} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.11)",color:"#bbb",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Inicio</button>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <BallIcon modalidad={modalidad} size={26} />
          <div style={{fontSize:9,color:"#777",letterSpacing:1,textTransform:"uppercase"}}>{modalidad} - C{carrera} - S#{seriesCount}</div>
        </div>
        <button onClick={()=>setShowHistoryP(true)} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.11)",color:"#bbb",borderRadius:8,padding:"6px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Hist.</button>
      </div>

      {/* Series bar */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 16px",background:"rgba(0,0,0,0.45)",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
          <span style={{fontSize:11,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,maxWidth:85,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p1Name}</span>
          <span style={{fontSize:30,fontWeight:900,lineHeight:1,color:sw1>sw2?"#f9e04b":"#fff"}}>{sw1}</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
          <div style={{fontSize:8,letterSpacing:2,color:"#63b3ed",textTransform:"uppercase"}}>SERIES</div>
          <div style={{fontSize:18,color:"#333",fontWeight:700}}>-</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10,flex:1,flexDirection:"row-reverse"}}>
          <span style={{fontSize:11,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:0.5,maxWidth:85,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p2Name}</span>
          <span style={{fontSize:30,fontWeight:900,lineHeight:1,color:sw2>sw1?"#f9e04b":"#fff"}}>{sw2}</span>
        </div>
      </div>

      {/* Banner */}
      {seriesFinished
        ? <div style={{textAlign:"center",padding:"7px 0",background:"rgba(249,224,75,0.08)",borderBottom:"1px solid rgba(249,224,75,0.18)",color:"#ddd",fontSize:13,fontWeight:600}}>Serie #{seriesCount} - Ganó: <strong style={{color:"#f9e04b"}}>{seriesWinner==="p1"?p1Name:p2Name}</strong></div>
        : <div style={{textAlign:"center",padding:"6px 0",background:"rgba(249,224,75,0.04)",borderBottom:"1px solid rgba(249,224,75,0.08)",color:"#bbb",fontSize:13}}>Saque: <strong style={{color:"#f9e04b"}}>{currentServe==="p1"?p1Name:p2Name}</strong></div>
      }

      {/* Cuadrícula */}
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:"6px 0",overflow:"hidden"}}>
        <div style={{display:"flex",overflow:"hidden"}}>
          <div style={{flexShrink:0,borderRight:BORDER}}>
            <div style={{height:HDR_H}} />
            {["p1","p2"].map((k,ri) => {
              const sw=k==="p1"?sw1:sw2, name=k==="p1"?p1Name:p2Name;
              const tFS=sw<=5?24:sw<=10?21:sw<=15?18:15;
              return <div key={k} style={{width:NAM_W,height:CELL_H,borderBottom:ri===0?BORDER:"none",background:"rgba(0,0,0,0.25)",display:"flex",flexDirection:"column",alignItems:"flex-start",justifyContent:"flex-start",padding:"8px 8px 6px",overflow:"hidden",boxSizing:"border-box"}}>
                <div style={{fontSize:26,fontWeight:800,color:"#e0e0e0",lineHeight:1.15,width:"100%",wordBreak:"break-word",flexShrink:0,marginBottom:6}}>{name}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:1,width:"100%",overflow:"hidden"}}>
                  {Array.from({length:sw},(_,i)=><span key={i} style={{fontSize:tFS,lineHeight:1.1}}>&#127942;</span>)}
                </div>
              </div>;
            })}
          </div>
          <div style={{flex:1,overflowX:"auto"}}>
            <div style={{minWidth:"max-content"}}>
              <div style={{display:"flex",height:HDR_H}}>
                {Array.from({length:totalJuegos},(_,ji)=><div key={ji} style={{width:CELL_W,textAlign:"center",fontSize:10,color:"#666",fontWeight:700,lineHeight:HDR_H+"px"}}>{ji+1}</div>)}
              </div>
              {["p1","p2"].map((k,ri)=>(
                <div key={k} style={{display:"flex",borderBottom:ri===0?BORDER:"none"}}>
                  {Array.from({length:totalJuegos},(_,ji)=>{
                    const gr=games[ji], hasWon=gr&&gr.winner===k;
                    const isLastGame=ji===games.length-1;
                    const isNext=!seriesFinished&&ji===games.length;
                    const isSaque=isNext&&currentServe===k;
                    // En jornada: bloqueado si no es el turno activo; o si ya se anotó victoria en este turno (turnScored) solo permitir modificar el juego actual
                    // Bloquear nuevas victorias (jornadaBlocked), permitir deshacer si es turno activo
                    // En jornada activa: bloquear agregar si ya se anotó; quitar solo con botón Deshacer
                    // En partida bloqueada (inactiva): bloquear todo
                    // En lobby: libre
                    const scored = jornadaTurnScored === true; // prop local, no Firebase
                    const blockAdd = jornadaBlocked ? true : (jornadaTurnActive ? scored : false);
                    // Permitir quitar victoria SOLO si scored=true Y es el último juego (mismo criterio que botón Deshacer)
                    const scoredThisTurn = scored || (activeMatch.jornadaTurnScored === true);
                    const canUndoByClick = jornadaTurnActive ? (scoredThisTurn && isLastGame) : true;
                    const blockUndo = jornadaBlocked ? true : (jornadaTurnActive ? !canUndoByClick : false);
                    const jornadaBlockCell = isNext ? blockAdd : (hasWon ? blockUndo : false);
                    const clickable=!isReadOnly&&!jornadaBlockCell&&(isNext||(hasWon&&isLastGame));
                    let pressTimer = null; let longPressed = false;
                    const onPressStart = () => { longPressed=false; if(isNext&&!isReadOnly&&!jornadaBlockCell) pressTimer = setTimeout(()=>{ longPressed=true; handleCellLongPress(k,ji); }, 600); };
                    const onPressEnd = () => { clearTimeout(pressTimer); };
                    return <div key={ji}
                       onClick={()=>{ if(!longPressed) { clickable&&handleCellClick(k,ji); } longPressed=false; }}
                      onMouseDown={onPressStart} onMouseUp={onPressEnd} onMouseLeave={onPressEnd}
                       onTouchStart={onPressStart} onTouchEnd={()=>{ onPressEnd(); }}
                      style={{width:CELL_W,height:CELL_H,borderRight:BORDER_THIN,display:"flex",alignItems:"center",justifyContent:"center",background:isNext?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.02)",position:"relative",cursor:clickable?"pointer":"default",boxShadow:(seriesFinished&&hasWon&&isLastGame)?"inset 0 0 0 2px rgba(249,115,22,0.5)":"none"}}>
                       {hasWon && (gr.ballType==="gold" ? <img src="golden_break.png" style={{width:28,height:42,objectFit:"contain"}}/> : gr.ballType==="diamond" ? <img src="run_out.png" style={{width:28,height:42,objectFit:"contain"}}/> : gr.ballType==="breakrun" ? <img src="break_run.png" style={{width:28,height:42,objectFit:"contain"}}/> : gr.ballType==="grandefensa" ? <img src="gran_defensa.png" style={{width:28,height:42,objectFit:"contain"}}/> : <BallIcon modalidad={modalidad} size={28}/>)}
                      {isSaque && <div style={{position:"absolute",top:4,left:0,right:0,display:"flex",justifyContent:"center"}}><CueBallSaque size={16} /></div>}
                    </div>;
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>
        <div style={{height:1,background:"rgba(255,255,255,0.06)",margin:"8px 0"}} />
        <div style={{fontSize:10,color:seriesFinished?"#f97316":"#555",textAlign:"center",paddingBottom:2}}>
          {seriesFinished?"Toca la última bola para deshacer - o presiona Siguiente serie":"Toca una casilla para asignar o quitar victoria"}
        </div>
      </div>

      {/* Menú de selección de bola */}
      {ballMenu && (
        <div style={{position:"fixed",inset:0,zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.7)"}} onClick={()=>setBallMenu(null)}>
          <div style={{background:"#0d1a3a",border:"1px solid rgba(99,179,237,0.3)",borderRadius:20,padding:"20px 24px",textAlign:"center"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:13,color:"#888",marginBottom:16}}>Elige el tipo de bola</div>
            <div style={{display:"flex",gap:16,justifyContent:"center"}}>
              <div onClick={()=>handleCellClick(ballMenu.k,ballMenu.ji,"normal")} style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <BallIcon modalidad={modalidad} size={44}/>
                <div style={{fontSize:11,color:"#aaa"}}>Normal</div>
              </div>
              <div onClick={()=>handleCellClick(ballMenu.k,ballMenu.ji,"gold")} style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <img src="golden_break.png" style={{width:44,height:66,objectFit:"contain"}}/>
                <div style={{fontSize:11,color:"#f5c400"}}>Golden Break</div>
              </div>
              <div onClick={()=>handleCellClick(ballMenu.k,ballMenu.ji,"diamond")} style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <img src="run_out.png" style={{width:44,height:66,objectFit:"contain"}}/>
                <div style={{fontSize:11,color:"#a8d8ff"}}>Run Out</div>
              </div>
              <div onClick={()=>handleCellClick(ballMenu.k,ballMenu.ji,"breakrun")} style={{cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <img src="break_run.png" style={{width:44,height:66,objectFit:"contain"}}/>
                <div style={{fontSize:11,color:"#ffa500"}}>Break & Run</div>
              </div>
            </div>
            <button onClick={()=>setBallMenu(null)} style={{marginTop:16,padding:"8px 24px",borderRadius:10,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",color:"#aaa",fontFamily:"inherit",fontSize:13,cursor:"pointer"}}>Cancelar</button>
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{display:"flex",gap:8,padding:"10px 14px",borderTop:"1px solid rgba(255,255,255,0.05)",background:"rgba(0,0,0,0.32)",alignItems:"center"}}>
        {!isReadOnly && seriesFinished
          ? <button style={{flex:2,fontSize:13,padding:"12px 0",borderRadius:14,background:"linear-gradient(135deg,#1e3a8a,#4ade80)",border:"none",color:"#fff",fontFamily:"inherit",fontWeight:800,cursor:"pointer"}} onClick={startNewSeries}>Siguiente serie</button>
          : <div style={{flex:2}} />
        }
        {!isReadOnly && <button style={{padding:"11px 14px",borderRadius:12,background:"rgba(255,80,80,0.12)",border:"1px solid rgba(255,80,80,0.28)",color:"#f87171",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}} onClick={()=>setShowCloseMatch(true)}>Terminar</button>}
      </div>

      {/* Modal terminar */}
      {showCloseMatch && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#0f2010",border:"1px solid rgba(74,222,128,0.16)",borderRadius:20,padding:"22px 20px",textAlign:"center",color:"#fff",width:300}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:10,color:"#e0e0e0"}}>¿Terminar esta partida?</div>
            <div style={{fontSize:13,color:"#aaa",marginBottom:14}}>{p1Name} vs {p2Name} - {modalidad}</div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button style={{padding:"11px 20px",borderRadius:10,background:"rgba(255,80,80,0.12)",border:"1px solid rgba(255,80,80,0.28)",color:"#f87171",fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"}} onClick={closeMatch}>Confirmar</button>
              <button style={{padding:"10px 20px",borderRadius:10,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.11)",color:"#aaa",fontFamily:"inherit",fontSize:14,cursor:"pointer"}} onClick={()=>setShowCloseMatch(false)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal historial editable */}
      {showHistory && activeMatch && activeMatch.modalidad === "Contrarreloj" && (()=>{
        const hm = activeMatch;
        const players = hm.crPlayers||[];
        const order = hm.crOrder||[];
        const roundHistory = hm.crRoundHistory||[];
        const accumTime = hm.crAccumTime||{};
        const validRoundsH = hm.crValidRounds||{};
        const serieWinsH = hm.crSerieWins||{};
        const serieHistoryH = hm.crSerieHistory||[];
        const totalSeriesH = hm.crTotalSeries||1;
        // Sumar rondas de TODAS las series (solo serieHistory, sin duplicar crRoundWins)
        const allRWH = {};
        serieHistoryH.forEach(s => {
          Object.entries(s.roundWins||{}).forEach(([k,v])=>{ allRWH[Number(k)]=(allRWH[Number(k)]||0)+v; });
        });
        // Solo agregar crRoundWins si la partida está en curso (última serie no guardada aún)
        if (serieHistoryH.length < (hm.crTotalSeries||1)) {
          Object.entries(hm.crRoundWins||{}).forEach(([k,v])=>{ allRWH[Number(k)]=(allRWH[Number(k)]||0)+v; });
        }
        const roundWins = allRWH;
        // Promedio: solo rondas válidas (sin forfeit)
        const avgTime = (pidx) => validRoundsH[pidx]>0 ? (accumTime[pidx]||0)/validRoundsH[pidx] : Infinity;
        const standings = [...order].sort((a,b)=>{
          const sw=(serieWinsH[b]||0)-(serieWinsH[a]||0); if(sw!==0) return sw;
          const rw=(roundWins[b]||0)-(roundWins[a]||0); if(rw!==0) return rw;
          return avgTime(a)-avgTime(b);
        });
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"20px 10px"}}>
            <div style={{background:"#0f2010",border:"1px solid rgba(74,222,128,0.18)",borderRadius:20,padding:"20px 16px",color:"#fff",width:"100%",maxWidth:420}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:15,fontWeight:700}}>Historial · Contrarreloj</div>
                <button onClick={()=>setShowHistoryP(false)} style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",color:"#aaa",borderRadius:8,padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
              </div>
              {/* Clasificación general */}
              <div style={{fontSize:11,color:"#63b3ed",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Clasificación</div>
              {standings.map((pidx,pos)=>(
                <div key={pidx} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",borderRadius:9,background:pos===0?"rgba(249,224,75,0.08)":"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",marginBottom:5}}>
                  <span style={{fontWeight:700,color:pos===0?"#f9e04b":"#e0e0e0"}}>{pos===0?"🏆":pos===1?"🥈":"🥉"} {pos+1}. {players[pidx]}</span>
                  <div style={{textAlign:"right"}}><div style={{fontSize:12,color:"#f9e04b",fontWeight:700}}>{serieWinsH[pidx]||0}/{totalSeriesH} series</div><div style={{fontSize:11,color:"#888"}}>{roundWins[pidx]||0} rondas · {validRoundsH[pidx]>0?fmtTime(avgTime(pidx))+" prom":"—"}</div></div>
                </div>
              ))}
              {/* Tabla de rondas */}
              {roundHistory.length>0 && (<>
                <div style={{fontSize:11,color:"#63b3ed",letterSpacing:1,textTransform:"uppercase",margin:"14px 0 8px"}}>Resultados por ronda</div>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr>
                        <td style={{padding:"5px 8px",color:"#555",fontWeight:700}}></td>
                        {roundHistory.map((r,ri)=>{
                          const sIdx = Math.floor(ri/(hm.crTotalRounds||1));
                          const rIdx = ri%(hm.crTotalRounds||1);
                          return <td key={r.round} style={{padding:"4px 4px",textAlign:"center",color:"#63b3ed",fontWeight:700,borderLeft:rIdx===0?"1px solid rgba(74,222,128,0.2)":"none",fontSize:10}}>S{sIdx+1}·R{rIdx+1}</td>;
                        })}
                        <td style={{padding:"4px 4px",textAlign:"center",color:"#f9e04b",fontWeight:700,borderLeft:"1px solid rgba(74,222,128,0.2)"}}>🏆S</td>
                        <td style={{padding:"4px 4px",textAlign:"center",color:"#888",fontWeight:700}}>Prom</td>
                      </tr>
                    </thead>
                    <tbody>
                      {order.map(pidx=>(
                        <tr key={pidx} style={{borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                          <td style={{padding:"6px 8px",fontWeight:700,color:"#e0e0e0",whiteSpace:"nowrap"}}>{players[pidx]}</td>
                          {roundHistory.map(r=>{
                            const isW=r.winner===pidx;
                            const t=r.times[pidx];
                            const isF=(r.forfeits||[]).includes(pidx);
                            const riIdx = roundHistory.indexOf(r)%(hm.crTotalRounds||1);
                            return <td key={r.round} style={{padding:"4px 4px",textAlign:"center",
                              borderLeft:riIdx===0?"1px solid rgba(74,222,128,0.15)":"none",
                              background:isW?"rgba(249,224,75,0.1)":isF?"rgba(239,68,68,0.08)":"transparent",
                              color:isW?"#f9e04b":isF?"#f87171":"#888",
                              fontWeight:isW?700:400,fontVariantNumeric:"tabular-nums",fontSize:10}}>
                              {t!==undefined?fmtTime(t):"—"}{isW?" 🏆":""}{isF?" ⚠":""}
                            </td>;
                          })}
                          <td style={{padding:"5px 4px",textAlign:"center",color:"#f9e04b",fontWeight:700,borderLeft:"1px solid rgba(74,222,128,0.15)"}}>{serieWinsH[pidx]||0}</td>
                          <td style={{padding:"6px 8px",textAlign:"center",color:"#888",fontVariantNumeric:"tabular-nums"}}>{accumTime[pidx]?fmtTime(accumTime[pidx]):"—"}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </>)}
              <button onClick={()=>setShowHistoryP(false)} style={{width:"100%",marginTop:16,padding:"12px 0",borderRadius:12,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",color:"#bbb",fontFamily:"inherit",fontSize:14,fontWeight:600,cursor:"pointer"}}>Cerrar</button>
            </div>
          </div>
        );
      })()}

      {showHistory && activeMatch && activeMatch.modalidad !== "Contrarreloj" && (
        <HistorialEditable
          p1Name={p1Name} p2Name={p2Name}
          modalidad={modalidad} carrera={carrera}
          seriesHistory={seriesHistory} seriesWins={seriesWins}
          games={games} seriesCount={seriesCount}
          seriesFinished={seriesFinished} seriesWinner={seriesWinner}
          matchClosed={isReadOnly} playersList={playersList}
          onClose={()=>setShowHistoryP(false)}
          onEditCurrentGame={(ji, k) => {
            updateMatch(activeId, m => {
              const ng = m.games.map((g,i) => i===ji ? {...g, winner:k} : g);
              const nw = {p1:0, p2:0};
              ng.forEach(g => nw[g.winner]++);
              const sf = nw.p1>=m.carrera||nw.p2>=m.carrera;
              const sw = nw.p1>=m.carrera?"p1":nw.p2>=m.carrera?"p2":null;
              return {...m, games:ng, wins:nw, seriesFinished:sf, seriesWinner:sw};
            });
          }}
          onDeleteLastSeries={() => {
            updateMatch(activeId, m => {
              if (m.seriesHistory.length===0) return m;
              const last = m.seriesHistory[m.seriesHistory.length-1];
              const nh = m.seriesHistory.slice(0,-1);
              const nsw = {p1:0,p2:0};
              nh.forEach(s => { if(s.winner&&!s.partial) nsw[s.winner]++; });
              return {...m, seriesHistory:nh, seriesWins:nsw, seriesCount:last.seriesNum,
                games:last.games||[], wins:{p1:last.p1wins,p2:last.p2wins},
                seriesFinished:true, seriesWinner:last.winner};
            });
          }}
          onEditHistoryGame={(si, ji, k, fallback) => {
            updateMatch(activeId, m => {
              const nh = m.seriesHistory.map((ser,idx) => {
                if(idx!==si) return ser;
                const bg = ser.games||fallback;
                const ng = bg.map((g,i) => i===ji ? {...g,winner:k} : g);
                const p1 = ng.filter(g=>g.winner==="p1").length;
                const p2 = ng.filter(g=>g.winner==="p2").length;
                const nw = p1>=m.carrera?"p1":p2>=m.carrera?"p2":ser.winner;
                return {...ser,games:ng,p1wins:p1,p2wins:p2,winner:nw};
              });
              const nsw = {p1:0,p2:0};
              nh.forEach(s => { if(s.winner&&!s.partial) nsw[s.winner]++; });
              return {...m, seriesHistory:nh, seriesWins:nsw};
            });
          }}
          onRestoreLastSeries={(lastSerie, lastGames) => {
            updateMatch(activeId, m => {
              const nh = m.seriesHistory.slice(0,-1);
              const nsw = {p1:0,p2:0};
              nh.forEach(s => { if(s.winner&&!s.partial) nsw[s.winner]++; });
              const rg = lastSerie.games||lastGames;
              const rw = {p1:rg.filter(g=>g.winner==="p1").length, p2:rg.filter(g=>g.winner==="p2").length};
              const lg = rg[rg.length-1];
              const ns = lg?(lg.serve==="p1"?"p2":"p1"):m.firstServe;
              return {...m, seriesHistory:nh, seriesWins:nsw, seriesCount:lastSerie.seriesNum,
                games:rg, wins:rw, currentServe:ns, seriesFinished:false, seriesWinner:null};
            });
            setShowHistoryP(false);
          }}
          onReactivar={isOperario?() => {
            updateMatch(activeId, m => {
      // Restaurar seriesWins previo al cierre (antes de que closeMatch sumara la última serie)
      const correctedSW = m.closedSeriesWins ? m.closedSeriesWins : m.seriesWins;
      // No tocar seriesFinished — si era true, "Sig. serie" quedará activo para continuar
      return {...m, matchClosed:false, closedAt:null, seriesWins:correctedSW, closedSeriesWins:null};
    });
            setShowHistoryP(false);
          }:null}
        />
      )}
    </div>
  );
}
