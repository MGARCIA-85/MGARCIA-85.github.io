 function fmtTime(totalSecs) {
  if (totalSecs == null || isNaN(totalSecs)) return "—";
  const m = Math.floor(totalSecs / 60);
  const s = Math.floor(totalSecs % 60);
  const ms = Math.floor((totalSecs % 1) * 100);
  return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(ms).padStart(2,"0")}`;
}

function CrTimer({ startTs, base=0, big=false }) {
  const [now, setNow] = React.useState(Date.now());
  React.useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 30);
    return () => clearInterval(id);
  }, [startTs]);
  const elapsed = (now - startTs) / 1000 + base;
  const display = fmtTime(elapsed);
  if (big) return <span style={{fontVariantNumeric:"tabular-nums"}}>{display}</span>;
  return <span style={{color:"#f9e04b",fontVariantNumeric:"tabular-nums"}}>{display}</span>;
}

function LobbyCard({m, onOpen, onDelete, onReplay, onUpdateMatch, onLobbyBallMenu, onOpenHistory, onNextSeries, onUndo, onReactivar, onTerminar, onMoveUp, onMoveDown, isFirst, isLast, onEditName, editingNameKey, jornadaTurnActive=false, onJornadaScore, jornadaBlocked=false, jornadaPaused=false, onPauseToggle, jornadaTurnScored=false, deviceName=null, playersList=[], isAdminMode=false}) {
  const getPlayerColor = (name) => {
    const p = playersList.find(pl=>(typeof pl==="string"?pl:pl.name)===name);
    return (p && typeof p!=="string" && p.color) ? p.color : null;
  };
  const isOpen = !m.matchClosed;

  // ── Contrarreloj en lobby ──
  if (m.modalidad === "Contrarreloj" && isOpen) {
    const players = m.crPlayers || [];
    const order = m.crOrder || [];
    const times = m.crTimes || {};
    const currentIdx = m.crCurrentIdx ?? 0;
    const running = m.crRunning || false;
    const startTs = m.crStartTs || null;
    const totalRounds = m.crTotalRounds || 1;
    const currentRound = m.crRound || 1;
    // Sumar rondas de TODAS las series (serieHistory ya guarda las rondas de cada serie)
    const _allRW = {};
    (m.crSerieHistory||[]).forEach(s => {
      Object.entries(s.roundWins||{}).forEach(([k,v])=>{ _allRW[Number(k)]=(_allRW[Number(k)]||0)+v; });
    });
    // Solo agregar crRoundWins si la serie actual aún no está en serieHistory
    if ((m.crSerieHistory||[]).length < (m.crCurrentSerie||1)) {
      Object.entries(m.crRoundWins||{}).forEach(([k,v])=>{ _allRW[Number(k)]=(_allRW[Number(k)]||0)+v; });
    }
    const roundWins = _allRW;
    const accumTime = m.crAccumTime || {};
    const roundHistory = m.crRoundHistory || [];
    const penaltyTime = m.crPenaltyTime || 10;
    const crFaults = m.crFaults || {};
    const totalSeries = m.crTotalSeries || 1;
    const currentSerie = m.crCurrentSerie || 1;
    const serieWins = m.crSerieWins || {};
    const serieHistory = m.crSerieHistory || [];
    const accumTime2 = m.crAccumTime||{};
    const validRounds2 = m.crValidRounds||{};
    const standings = [...order].sort((a,b)=>(roundWins[b]||0)-(roundWins[a]||0)||(accumTime[a]||0)-(accumTime[b]||0));
    const allDone = order.every(i => times[i] !== undefined);

    // Posiciones actuales por tiempo (solo los que ya jugaron esta ronda)
    const played = order.filter(i => times[i] !== undefined);
    const sorted = [...played].sort((a,b) => times[a]-times[b]);
    const posMap = {}; sorted.forEach((i,p) => posMap[i]=p+1);

    // Ganador de ronda = menor tiempo
    const roundWinner = allDone ? sorted[0] : null;

    const carreraTarget = m.crTotalRounds||1;
    const crRoundWins = m.crRoundWins||{};
    const matchOver = m.crMatchOver || (m.crRoundWins && Object.values(m.crRoundWins).some(v=>v>=carreraTarget));

    // Iniciar/Detener cronómetro
    const handleCrTap = () => {
      onUpdateMatch(m.id, mm => {
        if (mm.crCurrentIdx >= mm.crOrder.length) return mm;
        if (!mm.crRunning) {
          return {...mm, crRunning:true, crStartTs:Date.now()};
        } else {
          // Solo pausa, guarda tiempo parcial
          const elapsed = parseFloat(((Date.now()-mm.crStartTs)/1000).toFixed(2)) + (mm.crPausedTime||0);
          return {...mm, crRunning:false, crStartTs:null, crPausedTime:elapsed};
        }
      });
    };

    // Reiniciar (long press en detener)
    const handleCrReset = () => {
      onUpdateMatch(m.id, mm => ({...mm, crRunning:false, crStartTs:null, crPausedTime:0}));
    };

    // Registrar tiempo y pasar al siguiente (con lógica de 3 faltas = ronda perdida)
    const handleRegister = (forfeit=false) => {
      onUpdateMatch(m.id, mm => {
        if (mm.crCurrentIdx >= mm.crOrder.length) return mm;
        const pidx = mm.crOrder[mm.crCurrentIdx];
        const fKey = `${mm.crRound||1}_${pidx}`;
        const fCount = ((mm.crFaults||{})[fKey])||0;
        // Forfeit solo si se llama explícitamente con forfeit=true
        const isForfeit = forfeit === true;
        const FORFEIT_TIME = 30;
        const base = isForfeit ? 0 : (mm.crRunning
          ? parseFloat(((Date.now()-mm.crStartTs)/1000).toFixed(2)) + (mm.crPausedTime||0)
          : (mm.crPausedTime||0));
        const faultPenalty = isForfeit ? FORFEIT_TIME : parseFloat((fCount*(mm.crPenaltyTime||10)).toFixed(2));
        const total = parseFloat((base + faultPenalty).toFixed(2));
        const newTimes = {...(mm.crTimes||{}), [pidx]: total};
        const newFaultTimes = {...(mm.crFaultTimes||{}), [pidx]: faultPenalty};
        const nextIdx = mm.crCurrentIdx + 1;
        const isLast = nextIdx >= mm.crOrder.length;
        const baseState = {...mm, crRunning:false, crStartTs:null, crPausedTime:0, crTimes:newTimes, crCurrentIdx:nextIdx, crFaultTimes:newFaultTimes, crRoundDone:false};
        if (isLast) {
          const ord = mm.crOrder||[];
          // Ganador de ronda: menor tiempo entre rondas válidas (forfeit no compite)
          const fRef = mm.crFaults||{};
          const validPlayers = ord.filter(i => ((fRef[`${mm.crRound||1}_${i}`])||0) < 3);
          const rw = validPlayers.length > 0
            ? validPlayers.reduce((best,i)=> newTimes[i]<newTimes[best]?i:best, validPlayers[0])
            : null;
          const newRW = rw!==null ? {...(mm.crRoundWins||{}), [rw]:((mm.crRoundWins||{})[rw]||0)+1} : {...(mm.crRoundWins||{})};
          // Acumular tiempo total (válidas + penalización forfeit)
          const newAcc = {...(mm.crAccumTime||{})};
          ord.forEach(i=>{ if(newTimes[i]!==undefined) newAcc[i]=(newAcc[i]||0)+newTimes[i]; });
          // Contar solo rondas válidas (sin forfeit) para dividir el promedio
          const faultsRef = mm.crFaults||{};
          const newValidRounds = {...(mm.crValidRounds||{})};
          ord.forEach(i=>{
            const fk = `${mm.crRound||1}_${i}`;
            const fc = (faultsRef[fk])||0;
            if(newTimes[i]!==undefined && fc < 3) newValidRounds[i]=(newValidRounds[i]||0)+1;
          });
          // Guardar qué jugadores tuvieron forfeit en esta ronda
          const forfeitPlayers = ord.filter(i => ((fRef[`${mm.crRound||1}_${i}`])||0) >= 3);
          const newRH = [...(mm.crRoundHistory||[]), {round:mm.crRound||1, winner:rw, times:{...newTimes}, faultTimes:{...newFaultTimes}, forfeits:forfeitPlayers}];
          const currentRound = mm.crRound||1;
          // Carrera: termina cuando alguien alcanza crTotalRounds victorias
          const carrera = mm.crTotalRounds||1;
          const someoneReachedCarrera = ord.some(i => (newRW[i]||0) >= carrera);

          // Si terminó la serie (alguien llegó a la carrera)
          if (someoneReachedCarrera) {
            // Ganador de serie: más rondas ganadas; empate → mejor promedio (solo rondas válidas)
            const serieWinner = ord.reduce((best,i) => {
              const bw = newRW[best]||0, iw = newRW[i]||0;
              if (iw > bw) return i;
              if (iw < bw) return best;
              // Empate: mejor promedio
              const bAvg = (newAcc[best]||0)/(newValidRounds[best]||1);
              const iAvg = (newAcc[i]||0)/(newValidRounds[i]||1);
              return iAvg < bAvg ? i : best;
            }, ord[0]);
            const newSW = {...(mm.crSerieWins||{}), [serieWinner]:((mm.crSerieWins||{})[serieWinner]||0)+1};
            const newSH = [...(mm.crSerieHistory||[]), {serie:mm.crCurrentSerie||1, winner:serieWinner, roundWins:{...newRW}, accumTime:{...newAcc}, rounds:[...newRH], validRounds:{...(mm.crValidRounds||{})}}];
            const isMatchOver = (mm.crCurrentSerie||1) >= (mm.crTotalSeries||1);
            return {...baseState, crRoundWins:newRW, crAccumTime:newAcc, crValidRounds:newValidRounds, crRoundHistory:newRH, crRoundDone:true,
              crSerieWins:newSW, crSerieHistory:newSH,
              crMatchOver:isMatchOver,
              crSerieOver:true};
          }
          return {...baseState, crRoundWins:newRW, crAccumTime:newAcc, crValidRounds:newValidRounds, crRoundHistory:newRH, crRoundDone:true, crMatchOver:false, crSerieOver:false};
        }
        return baseState;
      });
    };

    // Auto-forfeit si llega a 3 faltas
    const currentFaultsNow = (crFaults[currentFaultKey])||0;
    const autoForfeit = currentFaultsNow >= 3;

    // Faltas (auto-forfeit a 3)
    const handleFault = (delta) => {
      onUpdateMatch(m.id, mm => {
        const pidx = mm.crOrder[mm.crCurrentIdx];
        const key = `${mm.crRound||1}_${pidx}`;
        const cur = ((mm.crFaults||{})[key])||0;
        const newVal = Math.max(0, cur+delta);
        return {...mm, crFaults:{...(mm.crFaults||{}), [key]:newVal}};
      });
    };

    // Nueva serie (después de terminar todas las rondas de una serie)
    const handleNewSerie = () => {
      onUpdateMatch(m.id, mm => ({
        ...mm,
        crTimes:{}, crCurrentIdx:0, crRunning:false, crStartTs:null, crPausedTime:0,
        crRound:1, crRoundWins:{},
        // NO resetear crAccumTime ni crValidRounds — acumulan a través de todas las series
        crRoundHistory:[],
        crFaults:{}, crFaultTimes:{},
        crCurrentSerie:(mm.crCurrentSerie||1)+1,
        crRoundDone:false, crSerieOver:false
      }));
    };

    const currentPidx = order[currentIdx];
    const currentFaultKey = `${currentRound}_${currentPidx}`;
    const currentFaults = (crFaults[currentFaultKey])||0;
    const pausedTime = m.crPausedTime || 0;
    const serieOver = m.crSerieOver || false;
    const matchOver2 = m.crMatchOver || false;

    const handleNewRound = () => {
      onUpdateMatch(m.id, mm => {
        const t = mm.crTimes||{};
        const ord = mm.crOrder||[];
        // Ganador = menor tiempo
        const rw = ord.reduce((best,i)=> t[i]!==undefined && (t[best]===undefined || t[i]<t[best]) ? i : best, ord[0]);
        // Acumular wins
        const newRoundWins = {...(mm.crRoundWins||{})};
        newRoundWins[rw] = (newRoundWins[rw]||0)+1;
        // Acumular tiempos
        const newAccum = {...(mm.crAccumTime||{})};
        ord.forEach(i=>{ if(t[i]!==undefined) newAccum[i]=(newAccum[i]||0)+t[i]; });
        // Guardar historial de rondas: quién ganó cada ronda y los tiempos
        const newRoundHistory = [...(mm.crRoundHistory||[]), {round: mm.crRound||1, winner:rw, times:{...t}}];
        return {...mm, crTimes:{}, crCurrentIdx:0, crRunning:false, crStartTs:null,
          crRound:(mm.crRound||1)+1, crRoundWins:newRoundWins, crAccumTime:newAccum, crRoundHistory:newRoundHistory};
      });
    };

    return (
      <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(74,222,128,0.18)",borderRadius:16,padding:"12px 14px",marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:18}}>⏱</span>
            <div>
              <div style={{fontSize:11,color:"#aaa"}}>{m.createdAt ? (()=>{const d=new Date(m.createdAt);return ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][d.getDay()]+" "+d.getDate()+" "+["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][d.getMonth()]+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");})() : ""}</div>
              <div style={{fontSize:13,fontWeight:700,color:"#63b3ed"}}>Serie {currentSerie}/{totalSeries} · Ronda {currentRound}/{totalRounds}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button style={{padding:"4px 10px",borderRadius:8,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.13)",color:"#bbb",fontFamily:"inherit",fontSize:11,cursor:"pointer"}} onClick={e=>{e.stopPropagation();onOpenHistory(m.id);}}>Hist.</button>
            {onDelete && <button style={{width:28,height:28,borderRadius:8,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",fontFamily:"inherit",fontSize:13,fontWeight:900,cursor:"pointer"}} onClick={e=>{e.stopPropagation();onDelete(m.id);}}>✕</button>}
          </div>
        </div>

        {/* Tabla de rondas */}
        {roundHistory.length > 0 && (()=>{
          return (
            <div style={{marginBottom:10,overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr>
                    <td style={{padding:"4px 6px",color:"#555",fontWeight:700}}></td>
                    {roundHistory.map(r=>(
                      <td key={r.round} style={{padding:"4px 6px",textAlign:"center",color:"#666",fontWeight:700}}>R{r.round}</td>
                    ))}
                    <td style={{padding:"4px 6px",textAlign:"center",color:"#63b3ed",fontWeight:700}}>🏆</td>
                    <td style={{padding:"4px 6px",textAlign:"center",color:"#888",fontWeight:700}}>Prom</td>
                  </tr>
                </thead>
                <tbody>
                  {order.map(pidx=>(
                    <tr key={pidx} style={{borderTop:"1px solid rgba(255,255,255,0.06)"}}>
                      <td style={{padding:"5px 6px",fontWeight:700,color:"#e0e0e0",whiteSpace:"nowrap"}}>{players[pidx]}</td>
                      {roundHistory.map(r=>{
                        const isW = r.winner===pidx;
                        const t = r.times[pidx];
                        const isForfeitCell = (r.forfeits||[]).includes(pidx);
                        return (
                          <td key={r.round} style={{padding:"5px 6px",textAlign:"center",
                            background:isW?"rgba(249,224,75,0.1)":isForfeitCell?"rgba(239,68,68,0.08)":"transparent",
                            color:isW?"#f9e04b":isForfeitCell?"#f87171":"#888",
                            fontWeight:isW?700:400,fontVariantNumeric:"tabular-nums"}}>
                            {t!==undefined?fmtTime(t):"—"}{isW?" 🏆":""}{isForfeitCell?" ⚠":""}
                          </td>
                        );
                      })}
                      <td style={{padding:"5px 6px",textAlign:"center",color:"#f9e04b",fontWeight:700}}>{roundWins[pidx]||0}</td>
                      <td style={{padding:"5px 6px",textAlign:"center",color:"#888",fontVariantNumeric:"tabular-nums"}}>{(m.crValidRounds||{})[pidx]>0?fmtTime((accumTime[pidx]||0)/((m.crValidRounds||{})[pidx])):"—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          );
        })()}

        {/* Lista de jugadores con tiempos */}
        {matchOver2 && (
          <div style={{background:"rgba(0,0,0,0.25)",borderRadius:12,padding:"12px",marginBottom:10,border:"1px solid rgba(74,222,128,0.15)"}}>
            <div style={{fontSize:11,color:"#63b3ed",letterSpacing:1,textTransform:"uppercase",marginBottom:10,fontWeight:700}}>🏁 Clasificación final</div>
            {standings.map((pidx,pos)=>(
              <div key={pidx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",borderRadius:10,
                background:pos===0?"rgba(249,224,75,0.1)":"rgba(255,255,255,0.04)",
                border:`1px solid ${pos===0?"rgba(249,224,75,0.25)":"rgba(255,255,255,0.07)"}`,marginBottom:6}}>
                <span style={{fontWeight:800,fontSize:17,color:pos===0?"#f9e04b":pos===1?"#e0e0e0":"#999"}}>
                  {pos===0?"🏆":pos===1?"🥈":"🥉"} {pos+1}. {players[pidx]}
                </span>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:14,color:"#f9e04b",fontWeight:700}}>{serieWins[pidx]||0}/{totalSeries} series</div>
                  <div style={{fontSize:12,color:"#aaa"}}>{roundWins[pidx]||0} rondas · {(m.crValidRounds||{})[pidx]>0?fmtTime((m.crAccumTime||{})[pidx]/(m.crValidRounds||{})[pidx])+" prom":"—"}</div>
                </div>
              </div>
            ))}
          </div>
        )}
        <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:10}}>
          {order.map((pidx,pos) => {
            const name = players[pidx] || "?";
            const t = times[pidx];
            const isCurrent = pos === currentIdx && !allDone;
            const roundPos = posMap[pidx];
            const wins = roundWins[pidx]||0;
            return (
              <div key={pidx} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 8px",borderRadius:10,background:isCurrent?"rgba(74,222,128,0.1)":"rgba(0,0,0,0.2)",border:isCurrent?"1px solid rgba(74,222,128,0.3)":"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:11,color:"#555",fontWeight:700,minWidth:14}}>{pos+1}.</span>
                  <div>
                    <div style={{fontSize:12,fontWeight:800,color:isCurrent?"#4ade80":"#e0e0e0"}}>{name}</div>
                    <div style={{fontSize:9,color:"#888"}}>
                      {(serieWins[pidx]||0)>0?`🏆 ${serieWins[pidx]}S`:""}{wins>0?` · ${wins}R`:""}
                    </div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  {roundPos && <div style={{fontSize:9,color:roundPos===1?"#f9e04b":roundPos===2?"#ccc":"#777",fontWeight:700}}>#{roundPos} esta ronda</div>}
                  <div style={{textAlign:"right"}}>
                    <span style={{fontSize:12,fontWeight:900,color:times[pidx]!==undefined?"#4ade80":"#444",fontVariantNumeric:"tabular-nums",display:"block"}}>
                      {times[pidx]!==undefined?fmtTime(times[pidx]):(isCurrent&&running?<CrTimer startTs={startTs} base={pausedTime} big={true}/>:"—")}
                    </span>
                    {times[pidx]!==undefined && (m.crFaultTimes||{})[pidx]>0 && (
                      <span style={{fontSize:9,color:"#f87171"}}>+{fmtTime((m.crFaultTimes||{})[pidx])} faltas</span>
                    )}
                  </div>
                </div>
              </div>
            );
          })}
        </div>

        {/* Cronómetro display */}
        {!allDone && (
          <div style={{textAlign:"center",marginBottom:8,padding:"10px 0",background:"rgba(0,0,0,0.2)",borderRadius:12}}>
            <div style={{fontSize:42,fontWeight:900,fontVariantNumeric:"tabular-nums",color:running?"#4ade80":"#fff",letterSpacing:2}}>
              {running ? <CrTimer startTs={startTs} base={pausedTime}/> : <span style={{fontVariantNumeric:"tabular-nums"}}>{fmtTime(pausedTime)}</span>}
            </div>
            {currentFaults > 0 && (
              <div style={{fontSize:12,color:"#f87171",marginTop:2}}>
                +{fmtTime(currentFaults*penaltyTime)} penalización ({currentFaults} falta{currentFaults>1?"s":""})
              </div>
            )}
          </div>
        )}
        {!allDone && (
          <>
            {/* Botón principal Iniciar/Detener */}
            <button
              onClick={e=>{e.stopPropagation();handleCrTap();}}
              onContextMenu={e=>{e.preventDefault();e.stopPropagation();handleCrReset();}}
              onTouchStart={e=>{e.stopPropagation();}}
              style={{width:"100%",padding:"18px 0",borderRadius:14,border:"none",fontFamily:"inherit",fontSize:18,fontWeight:900,cursor:"pointer",marginBottom:8,
                background:running?"linear-gradient(135deg,#7f1d1d,#ef4444)":"linear-gradient(135deg,#1e3a8a,#4ade80)",
                color:"#fff"}}>
              {running ? "⏹ Detener" : (pausedTime>0 ? "▶ Continuar" : "▶ Iniciar")}
            </button>
            {/* Fila inferior: Registrar + Faltas */}
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <div style={{flex:2,display:"flex",gap:6}}>
                <button onClick={e=>{
                  e.stopPropagation();
                  if (pausedTime<=0 && !running) { alert("Para registrar resultados antes debes haber iniciado un turno."); return; }
                  handleRegister(false);
                }}
                  style={{flex:1,padding:"10px 6px",borderRadius:8,border:"none",fontFamily:"inherit",fontSize:13,fontWeight:800,cursor:"pointer",
                    background:"linear-gradient(135deg,#1e3a8a,#3b82f6)",color:"#fff"}}>
                  ✓ Registrar
                </button>
                <button onClick={e=>{
                  e.stopPropagation();
                  if (window.confirm("¿Confirmas que el jugador pierde su turno? Se añadirán 30s de penalización.")) handleRegister(true);
                }}
                  style={{flex:1,padding:"10px 6px",borderRadius:8,border:"none",fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer",
                    background:"linear-gradient(135deg,#7f1d1d,#ef4444)",color:"#fff"}}>
                  ⛔ Perder turno
                </button>
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column",gap:4}}>
                <div style={{fontSize:10,color:"#f87171",textAlign:"center",fontWeight:700}}>Faltas (+{penaltyTime}s)</div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={e=>{e.stopPropagation();handleFault(-1);}}
                    style={{flex:1,padding:"8px 0",borderRadius:8,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",fontFamily:"inherit",fontSize:16,fontWeight:900,cursor:"pointer"}}>−</button>
                  <span style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:currentFaults>0?"#f87171":"#555"}}>{currentFaults}</span>
                  <button onClick={e=>{e.stopPropagation();handleFault(1);}}
                    style={{flex:1,padding:"8px 0",borderRadius:8,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",color:"#f87171",fontFamily:"inherit",fontSize:16,fontWeight:900,cursor:"pointer"}}>+</button>
                </div>
              </div>
            </div>
          </>
        )}
        {allDone && !serieOver && !matchOver2 && roundWinner!==null && (
          <div style={{textAlign:"center",padding:"6px 0",fontSize:13,fontWeight:700,color:"#f9e04b",marginBottom:4}}>
            Ronda {currentRound} → 🏆 {players[roundWinner]} ({fmtTime(times[roundWinner])})
          </div>
        )}
        {serieOver && !matchOver2 && (
          <div style={{textAlign:"center",padding:"8px 0",fontSize:13,fontWeight:700,color:"#63b3ed",marginBottom:4}}>
            Serie {currentSerie} terminada · Siguiente: Serie {currentSerie+1}/{totalSeries}
          </div>
        )}

        <div style={{display:"flex",gap:5,marginTop:4}}>
          {allDone && !serieOver && !matchOver2 && (
            <button onClick={e=>{e.stopPropagation();onUpdateMatch(m.id,mm=>({...mm,crTimes:{},crCurrentIdx:0,crRunning:false,crStartTs:null,crPausedTime:0,crRound:(mm.crRound||1)+1,crRoundDone:false,crFaults:{},crFaultTimes:{}}));}}
              style={{flex:1,padding:"7px 0",borderRadius:9,background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.2)",color:"#63b3ed",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              Ronda {currentRound+1} →
            </button>
          )}
          {serieOver && !matchOver2 && (
            <button onClick={e=>{e.stopPropagation();handleNewSerie();}}
              style={{flex:1,padding:"7px 0",borderRadius:9,background:"rgba(74,222,128,0.1)",border:"1px solid rgba(74,222,128,0.2)",color:"#63b3ed",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              Serie {currentSerie+1} →
            </button>
          )}
          <button onClick={e=>{e.stopPropagation();if(m.seriesFinished){alert("Debes confirmar la serie actual antes de terminar la partida.");return;}onTerminar(m.id);}} style={{flex:1,padding:"7px 0",borderRadius:9,
            background:m.seriesFinished?"rgba(239,68,68,0.06)":"rgba(239,68,68,0.1)",
            border:"1px solid rgba(239,68,68,0.25)",
            color:m.seriesFinished?"#664":"#f87171",
            fontFamily:"inherit",fontSize:11,fontWeight:700,
            cursor:m.seriesFinished?"not-allowed":"pointer",
            opacity:m.seriesFinished?0.45:1}}>Terminar</button>
        </div>
      </div>
    );
  }

  const sw1 = m.seriesWins.p1+(m.seriesFinished&&m.seriesWinner==="p1"?1:0);
  const sw2 = m.seriesWins.p2+(m.seriesFinished&&m.seriesWinner==="p2"?1:0);

  const CELL_W=38, CELL_H=85, NAM_W=175, HDR_H=14;
  const BORDER="1px solid rgba(255,255,255,0.2)";
  const BORDER_THIN="1px solid rgba(255,255,255,0.08)";
  const totalJuegos = m.carrera*2-1;

  const handleClick = (k, ji) => {
    if (!isOpen) return;
    const gr = m.games[ji];
    const hasWon = gr && gr.winner === k;
    const isLastGame = ji === m.games.length-1;
    const isNext = !m.seriesFinished && ji === m.games.length;
    if (isNext) {
      const newWins = {...m.wins, [k]: m.wins[k]+1};
      const nextServe = m.currentServe==="p1"?"p2":"p1";
      const willFinish = newWins[k] >= m.carrera;
      onUpdateMatch(m.id, mm => ({...mm, wins:newWins, games:[...mm.games,{winner:k,serve:m.currentServe,ballType:"normal",device:deviceName||undefined}], currentServe:nextServe, seriesFinished:willFinish, seriesWinner:willFinish?k:null, jornadaTurnScored: jornadaTurnActive ? true : mm.jornadaTurnScored}));
      if (onJornadaScore) onJornadaScore();
    } else if (hasWon && isLastGame) {
      // Deshacer último juego — funciona aunque la serie esté terminada
      onUpdateMatch(m.id, mm => {
        const last = mm.games[mm.games.length-1];
        return {...mm, games:mm.games.slice(0,-1), wins:{...mm.wins,[last.winner]:mm.wins[last.winner]-1}, currentServe:last.serve, seriesFinished:false, seriesWinner:null, jornadaTurnScored:false};
      });
      // Limpiar turnScored en la jornada para que pueda anotar de nuevo
      if (onJornadaScore) onJornadaScore('undo');
    }
  };

  return (
    <div style={{display:"flex",flexDirection:"column",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"10px 12px",marginBottom:10,opacity:isOpen?1:0.95}}>

      {/* Cabecera */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flex:1}}>
          <BallIcon modalidad={m.modalidad} size={20}/>
          <div>
            <div style={{fontSize:11,color:"#aaa",fontWeight:500}}>{formatDate(m.createdAt)}</div>
            <div style={{fontSize:13,fontWeight:700,color:m.modalidad==="Bola 9"?"#f9e04b":m.modalidad==="Bola 7"?"#e05050":m.modalidad==="Bola 8"?"#cccccc":m.modalidad==="Contrarreloj"?"#4ade80":"#4ade80"}}>{m.modalidad==="Contrarreloj"?`Contrarreloj · ${m.crTotalSeries||1}S · ${m.crTotalRounds||1}R`:`${m.modalidad} · Carrera ${m.carrera}`}</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          {onMoveUp && (<>
            <button onClick={e=>{e.stopPropagation();if(!isFirst)onMoveUp(m.id);}} style={{width:24,height:24,borderRadius:6,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:isFirst?"#333":"#aaa",fontSize:12,cursor:isFirst?"default":"pointer",padding:0}}>↑</button>
            <button onClick={e=>{e.stopPropagation();if(!isLast)onMoveDown(m.id);}} style={{width:24,height:24,borderRadius:6,background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",color:isLast?"#333":"#aaa",fontSize:12,cursor:isLast?"default":"pointer",padding:0}}>↓</button>
          </>)}
          <div style={{fontSize:9,color:isOpen?"#4ade80":"#888",background:isOpen?"rgba(74,222,128,0.1)":"rgba(255,255,255,0.05)",border:isOpen?"1px solid rgba(74,222,128,0.22)":"none",borderRadius:20,padding:"2px 7px",fontWeight:700}}>{isOpen?"EN JUEGO":"FIN"}</div>
          {isOpen && <button style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",color:"#bbb",borderRadius:8,padding:"3px 7px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}} onClick={e=>{e.stopPropagation();onOpenHistory(m.id);}}>Hist.</button>}
          {onDelete && <button style={{background:"rgba(255,80,80,0.1)",border:"1px solid rgba(255,80,80,0.2)",color:"#f87171",borderRadius:8,padding:"3px 7px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}} onClick={e=>{e.stopPropagation();onDelete(m.id);}}>x</button>}
        </div>
      </div>

      {/* Cuadrícula para partidas activas */}
      {isOpen && <>
        <div style={{display:"flex",overflow:"hidden"}}>
          <div style={{flexShrink:0,borderRight:BORDER}}>
            <div style={{height:HDR_H}}/>
            {["p1","p2"].map((k,ri)=>{
              const name=k==="p1"?m.p1Name:m.p2Name;
              const wins=k==="p1"?m.wins.p1:m.wins.p2;
              const isSaque=!m.seriesFinished&&m.currentServe===k;
              return <div key={k} style={{width:NAM_W,height:CELL_H,borderBottom:ri===0?BORDER:"none",background:"rgba(0,0,0,0.2)",display:"flex",flexDirection:"column",alignItems:"flex-start",justifyContent:"flex-start",padding:"8px 10px",overflow:"hidden",boxSizing:"border-box"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}>
                  <div style={{fontSize:20,fontWeight:800,color:getPlayerColor(name)||"#e0e0e0",lineHeight:1.2}}>{name}</div>
                  
                </div>
                <div style={{fontSize:18,display:"flex",flexWrap:"wrap",gap:2}}>{Array.from({length:k==="p1"?sw1:sw2},(_,i)=><span key={i}>&#127942;</span>)}</div>
              </div>;
            })}
          </div>
          <div style={{flex:1,overflowX:"auto"}}>
            <div style={{minWidth:"max-content"}}>
              <div style={{display:"flex",height:HDR_H}}>
                {Array.from({length:totalJuegos},(_,ji)=><div key={ji} style={{width:CELL_W,textAlign:"center",fontSize:9,color:"#666",fontWeight:700,lineHeight:HDR_H+"px"}}>{ji+1}</div>)}
              </div>
              {["p1","p2"].map((k,ri)=>(
                <div key={k} style={{display:"flex",borderBottom:ri===0?BORDER:"none"}}>
                  {Array.from({length:totalJuegos},(_,ji)=>{
                    const gr=m.games[ji], hasWon=gr&&gr.winner===k;
                    const isLastGame=ji===m.games.length-1;
                    const isNext=ji===m.games.length;
                    const isSaque=isNext&&m.currentServe===k;
                    // Bloqueo de jornada en cuadrícula
                    const jBlockAdd = jornadaBlocked ? true : (jornadaTurnActive ? jornadaTurnScored : false);
                    // Permitir quitar la victoria recién anotada en este turno aunque jornadaBlocked=true
                    // (jornadaBlocked se activa justamente cuando se anota, pero eso no debe impedir corregir)
                    const jCanUndoByClick = jornadaTurnScored && isLastGame;
                    const jBlockUndo = jCanUndoByClick ? false : (jornadaBlocked ? true : (jornadaTurnActive ? true : false));
                    const jBlockCell = isNext ? jBlockAdd : (hasWon ? jBlockUndo : false);
                    const clickable=!jBlockCell&&(isNext||(hasWon&&isLastGame));
                    let lpt=null, lpp=false;
                    const lps=()=>{ lpp=false; if(isNext&&!jBlockAdd&&!m.seriesFinished) lpt=setTimeout(()=>{ lpp=true; onLobbyBallMenu({matchId:m.id,k,ji}); },600); };
                    const lpe=()=>clearTimeout(lpt);
                    return <div key={ji}
                      onClick={()=>{ if(!lpp) clickable&&handleClick(k,ji); lpp=false; }}
                      onMouseDown={lps} onMouseUp={lpe} onMouseLeave={lpe}
                      onTouchStart={lps} onTouchEnd={lpe}
                      style={{width:CELL_W,height:CELL_H,borderRight:BORDER_THIN,display:"flex",alignItems:"center",justifyContent:"center",background:isNext?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.01)",position:"relative",cursor:clickable?"pointer":"default"}}>
                      {hasWon&&(gr.ballType==="gold"?<img src="golden_break.png" style={{width:28,height:42,objectFit:"contain"}}/>:gr.ballType==="diamond"?<img src="run_out.png" style={{width:28,height:42,objectFit:"contain"}}/>:gr.ballType==="breakrun"?<img src="break_run.png" style={{width:28,height:42,objectFit:"contain"}}/>:gr.ballType==="grandefensa"?<img src="gran_defensa.png" style={{width:28,height:42,objectFit:"contain"}}/>:<BallIcon modalidad={m.modalidad} size={28}/>)}
                      {hasWon&&gr.device&&(()=>{
                        // Buscar jugador por nombre o por ID
                        const devPlayer = playersList.find(p=>{
                          const pn=typeof p==="string"?p:p.name;
                          const pid=typeof p==="string"?"":p.id||"";
                          return pn===gr.device||pid===gr.device;
                        });
                        const devColor = devPlayer&&typeof devPlayer!=="string"&&devPlayer.color ? devPlayer.color : "rgba(255,255,255,0.6)";
                        // Mostrar ID si existe, si no el valor guardado
                        const devLabel = devPlayer&&typeof devPlayer!=="string"&&devPlayer.id ? devPlayer.id : gr.device;
                        return <div style={{position:"absolute",bottom:4,left:0,right:0,textAlign:"center",fontSize:8,fontWeight:800,color:devColor,lineHeight:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 2px",textShadow:"0 1px 3px rgba(0,0,0,0.9)",letterSpacing:0.3}}>{devLabel}</div>;
                      })()}
                      {isSaque&&<div style={{position:"absolute",top:3,left:0,right:0,display:"flex",justifyContent:"center"}}><CueBallSaque size={14}/></div>}
                    </div>;
                  })}
                </div>
              ))}
            </div>
          </div>
        </div>

        <div style={{display:"flex",gap:5,marginTop:6}}>
          <button style={{flex:2,padding:"8px 0",borderRadius:10,background:m.seriesFinished?"linear-gradient(135deg,#1e3a8a,#4ade80)":"rgba(255,255,255,0.06)",border:m.seriesFinished?"none":"1px solid rgba(255,255,255,0.1)",color:m.seriesFinished?"#fff":"#555",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:m.seriesFinished?"pointer":"default"}} onClick={e=>{e.stopPropagation();if(m.seriesFinished)onNextSeries(m.id);}}>Confirmar ✓</button>
          {(()=>{ const scored3 = jornadaTurnScored===true; const cu3 = jornadaTurnActive ? scored3 : (jornadaBlocked ? false : (m.games.length>0||m.seriesHistory.length>0)); return (
          <button style={{flex:1,padding:"8px 0",borderRadius:10,background:cu3?"rgba(255,200,50,0.1)":"rgba(255,255,255,0.04)",border:cu3?"1px solid rgba(255,200,50,0.25)":"1px solid rgba(255,255,255,0.08)",color:cu3?"#f9e04b":"#444",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:cu3?"pointer":"default"}} onClick={e=>{
                  e.stopPropagation();
                  const scored2 = jornadaTurnScored===true;
                  const canUndo = jornadaTurnActive ? scored2 : (jornadaBlocked ? false : (m.games.length>0||m.seriesHistory.length>0));
                  if(canUndo) onUndo(m.id);
                }}>↩ Deshacer</button>); })()}

          {onPauseToggle && (
            <button onClick={e=>{e.stopPropagation();onPauseToggle(m.id);}}
              style={{flex:1,padding:"8px 0",borderRadius:10,background:jornadaPaused?"rgba(74,222,128,0.1)":"rgba(255,200,50,0.1)",border:jornadaPaused?"1px solid rgba(74,222,128,0.25)":"1px solid rgba(255,200,50,0.25)",color:jornadaPaused?"#4ade80":"#f9e04b",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}}>
              {jornadaPaused?"▶ Reanudar":"⏸ Pausa"}
            </button>
          )}
          <button style={{flex:1,padding:"8px 0",borderRadius:10,
            background:m.seriesFinished?"rgba(239,68,68,0.06)":"rgba(239,68,68,0.1)",
            border:"1px solid rgba(239,68,68,0.25)",
            color:m.seriesFinished?"#664":"#f87171",
            fontFamily:"inherit",fontSize:11,fontWeight:700,
            cursor:m.seriesFinished?"not-allowed":"pointer",
            opacity:m.seriesFinished?0.45:1}}
            onClick={e=>{e.stopPropagation();if(m.seriesFinished){alert("Debes confirmar la serie actual antes de terminar la partida.");return;}onTerminar(m.id);}}>Terminar</button>
        </div>
      </>}

      {/* Partidas terminadas */}
      {!isOpen && (()=>{
        const sw1c = m.seriesWins.p1;
        const sw2c = m.seriesWins.p2;
        return (
          <div>
            {/* Resumen visual */}
            {m.modalidad === "Contrarreloj" ? (()=>{
              const players = m.crPlayers||[];
              const order = m.crOrder||[];
              const serieWinsR = m.crSerieWins||{};
              const accumTime = m.crAccumTime||{};
              const validRoundsR = m.crValidRounds||{};
              const totalSeriesR = m.crTotalSeries||1;
              const totalRoundsR = m.crTotalRounds||1;
              // Sumar rondas de TODAS las series (solo serieHistory)
              const allRoundWins = {};
              (m.crSerieHistory||[]).forEach(s => {
                Object.entries(s.roundWins||{}).forEach(([k,v]) => {
                  allRoundWins[Number(k)] = (allRoundWins[Number(k)]||0) + v;
                });
              });
              // Solo agregar crRoundWins si aún hay series en curso
              if ((m.crSerieHistory||[]).length < (m.crTotalSeries||1)) {
                Object.entries(m.crRoundWins||{}).forEach(([k,v]) => {
                  allRoundWins[Number(k)] = (allRoundWins[Number(k)]||0) + v;
                });
              }
              const roundWins = allRoundWins;
              // Ordenar por series ganadas → rondas → promedio
              const standings = [...order].sort((a,b)=>{
                const sw=(serieWinsR[b]||0)-(serieWinsR[a]||0); if(sw!==0) return sw;
                const rw=(roundWins[b]||0)-(roundWins[a]||0); if(rw!==0) return rw;
                const aAvg=validRoundsR[a]>0?(accumTime[a]||0)/validRoundsR[a]:Infinity;
                const bAvg=validRoundsR[b]>0?(accumTime[b]||0)/validRoundsR[b]:Infinity;
                return aAvg-bAvg;
              });
              return (
                <div style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"10px",marginBottom:8}}>
                  <div style={{fontSize:10,color:"#63b3ed",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>⏱ Clasificación final</div>
                  {standings.map((pidx,pos)=>(
                    <div key={pidx} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 8px",borderRadius:8,background:pos===0?"rgba(249,224,75,0.08)":"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",marginBottom:4}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:13}}>{pos===0?"🏆":pos===1?"🥈":"🥉"}</span>
                        <span style={{fontSize:14,fontWeight:800,color:pos===0?"#f9e04b":pos===1?"#ccc":"#888"}}>{pos+1}. {players[pidx]}</span>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:11,color:"#f9e04b",fontWeight:700}}>{serieWinsR[pidx]||0}/{totalSeriesR} series</div>
                        <div style={{fontSize:10,color:"#888"}}>{roundWins[pidx]||0} rondas · {validRoundsR[pidx]>0?fmtTime((accumTime[pidx]||0)/validRoundsR[pidx])+" prom":"—"}</div>
                      </div>
                    </div>
                  ))}
                </div>
              );
            })() : (
            <div style={{background:"rgba(0,0,0,0.2)",borderRadius:10,padding:"10px 10px 8px",marginBottom:8}}>
              {/* Nombres y bola */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:15,fontWeight:900,color:getPlayerColor(m.p1Name)||"#fff",flex:1}}>{m.p1Name}</div>
                <BallIcon modalidad={m.modalidad} size={24}/>
                <div style={{fontSize:15,fontWeight:900,color:getPlayerColor(m.p2Name)||"#fff",flex:1,textAlign:"right"}}>{m.p2Name}</div>
              </div>
              {/* Trofeos y marcador */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(0,0,0,0.2)",borderRadius:8,padding:"6px 8px"}}>
                <div style={{display:"flex",flexWrap:"wrap",gap:1,flex:1}}>
                  {Array.from({length:sw1c},(_,i)=><span key={i} style={{fontSize:14}}>🏆</span>)}
                </div>
                <div style={{fontSize:22,fontWeight:900,padding:"0 8px",textAlign:"center",letterSpacing:2}}>
                  <span style={{color:sw1c>sw2c?"#f9e04b":"#fff"}}>{sw1c}</span>
                  <span style={{color:"#444",margin:"0 5px"}}>-</span>
                  <span style={{color:sw2c>sw1c?"#f9e04b":"#fff"}}>{sw2c}</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:1,flex:1,justifyContent:"flex-end"}}>
                  {Array.from({length:sw2c},(_,i)=><span key={i} style={{fontSize:14}}>🏆</span>)}
                </div>
              </div>
              {/* Serie inconclusa — mostrar bolas si hay juegos sin terminar */}
              {(()=>{
                const ig=m.games||[];
                const p1w=ig.filter(g=>g.winner==="p1").length;
                const p2w=ig.filter(g=>g.winner==="p2").length;
                if(ig.length===0) return null;
                return (
                  <div style={{marginTop:8,background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"6px 8px"}}>
                    <div style={{fontSize:10,color:"#f9e04b",fontWeight:700,marginBottom:5}}>Serie {m.seriesFinished?"concluida":"inconclusa"} #{m.seriesCount}</div>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6}}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:2,flex:1}}>
                        {ig.filter(g=>g.winner==="p1").map((g,j)=>g.ballType==="gold"?<img key={j} src="golden_break.png" style={{width:22,height:33,objectFit:"contain"}}/>:g.ballType==="diamond"?<img key={j} src="run_out.png" style={{width:22,height:33,objectFit:"contain"}}/>:g.ballType==="breakrun"?<img key={j} src="break_run.png" style={{width:22,height:33,objectFit:"contain"}}/>:g.ballType==="grandefensa"?<img key={j} src="gran_defensa.png" style={{width:22,height:33,objectFit:"contain"}}/>:<BallIcon key={j} modalidad={m.modalidad} size={22}/>)}
                        {p1w===0&&<span style={{fontSize:10,color:"#444"}}>—</span>}
                      </div>
                      <div style={{fontSize:11,color:"#444",fontWeight:700,flexShrink:0}}>vs</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:2,flex:1,justifyContent:"flex-end"}}>
                        {ig.filter(g=>g.winner==="p2").map((g,j)=>g.ballType==="gold"?<img key={j} src="golden_break.png" style={{width:22,height:33,objectFit:"contain"}}/>:g.ballType==="diamond"?<img key={j} src="run_out.png" style={{width:22,height:33,objectFit:"contain"}}/>:g.ballType==="breakrun"?<img key={j} src="break_run.png" style={{width:22,height:33,objectFit:"contain"}}/>:g.ballType==="grandefensa"?<img key={j} src="gran_defensa.png" style={{width:22,height:33,objectFit:"contain"}}/>:<BallIcon key={j} modalidad={m.modalidad} size={22}/>)}
                        {p2w===0&&<span style={{fontSize:10,color:"#444"}}>—</span>}
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
            )}
            {/* Botones en una línea */}
            <div style={{display:"flex",gap:5}}>
              <button style={{flex:1,padding:"7px 0",borderRadius:9,background:"linear-gradient(135deg,#1e3a8a,#4ade80)",border:"none",color:"#fff",fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer"}} onClick={e=>{e.stopPropagation();onReplay(m);}}>↺ Re-crear</button>
              <button style={{flex:1,padding:"7px 0",borderRadius:9,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.15)",color:"#bbb",fontFamily:"inherit",fontSize:11,fontWeight:600,cursor:"pointer"}} onClick={e=>{e.stopPropagation();onOpenHistory(m.id);}}>📋 Historial</button>
              {onReactivar && <button style={{flex:1,padding:"7px 0",borderRadius:9,background:"rgba(74,222,128,0.08)",border:"1px solid rgba(74,222,128,0.2)",color:"#63b3ed",fontFamily:"inherit",fontSize:11,fontWeight:600,cursor:"pointer"}} onClick={e=>{e.stopPropagation();onReactivar(m.id);}}>↺ Reactivar</button>}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function App() {
  const [ok, setOk] = useState(()=>!!localStorage.getItem("bg"));
  if (!ok) return <Acceso ok={()=>setOk(true)} />;
  return <BillarApp />;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
